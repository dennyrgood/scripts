<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEET_GLOBAL | Orbital View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030508;
            color: #8ba0b4;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0.04;
        }
        .map-container { cursor: grab; }
        .map-container:active { cursor: grabbing; }
        .panel-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .pulse { animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .node-group:hover circle.hit-area { fill: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="flex flex-col">

    <div class="scanline"></div>

    <!-- HEADER -->
    <header class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-40 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black tracking-tighter text-white flex items-center gap-2 italic">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#3b82f6" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                FLEET_GLOBAL
            </h1>
            <nav class="flex gap-1 bg-white/5 p-1 rounded-sm border border-white/10">
                <button id="view-map" class="px-4 py-1 rounded-sm text-[10px] font-black transition-all uppercase bg-blue-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.4)]">Surface_Map</button>
                <button id="view-orbital" class="px-4 py-1 rounded-sm text-[10px] font-black transition-all uppercase text-slate-500 hover:bg-white/5">Orbital_Grid</button>
            </nav>
        </div>
        <div class="hidden md:flex items-center gap-8 text-[9px] font-mono tracking-[0.3em] text-slate-500">
            <div class="text-right">
                <span class="text-emerald-500 font-bold block">● SYSTEM_LIVE</span>
                <span class="opacity-50 uppercase">Latency: 24ms</span>
            </div>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <div>
                <span class="text-red-400 font-bold block animate-pulse">AMS_ALERT</span>
                <span class="opacity-50 italic uppercase">Sync_Fail</span>
            </div>
        </div>
    </header>

    <!-- MAIN VIEW -->
    <main class="relative flex-1 flex overflow-hidden">
        <div id="map-wrapper" class="w-full h-full relative">
            <svg id="fleet-svg" class="w-full h-full map-container">
                <rect width="100%" height="100%" fill="#030508" id="bg-click-surface"></rect>
                <g id="map-layer">
                    <g id="countries"></g>
                    <g id="nodes"></g>
                </g>
            </svg>
            <div id="orbital-layer" class="hidden absolute inset-0 flex items-center justify-center bg-[#070b12] z-10">
                <div class="text-center z-10">
                    <div class="w-64 h-64 rounded-full border border-blue-500/20 flex items-center justify-center animate-[spin_30s_linear_infinite] mb-8 mx-auto relative">
                        <div class="absolute top-0 w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_15px_#3b82f6]"></div>
                    </div>
                    <h2 class="text-4xl font-thin tracking-[0.8em] text-white uppercase italic">ORBITAL_CORE</h2>
                </div>
            </div>
        </div>

        <!-- DETAIL PANEL -->
        <aside id="detail-panel" class="panel-transition translate-x-full fixed right-0 top-0 bottom-0 border-l border-white/10 bg-[#030508]/98 backdrop-blur-2xl flex flex-col z-[150] w-[90%] md:w-[450px] shadow-[-20px_0_50px_rgba(0,0,0,0.5)]">
            <div class="flex flex-col h-full w-full">
                <div class="p-8 border-b border-white/10 flex justify-between items-start">
                    <div id="panel-header" class="flex-1"></div>
                    <button id="close-panel" class="p-2 hover:bg-white/10 rounded-full text-slate-500 transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div id="host-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
                <div class="p-8 bg-black/40 border-t border-white/10">
                    <button class="w-full py-5 bg-blue-700 text-white font-black text-[11px] tracking-[0.4em] uppercase shadow-[0_15px_30px_-10px_rgba(37,99,235,0.4)] italic">
                        DIAGNOSTIC_CONSOLE
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // --- AUTHENTIC DATA FROM JSON CONFIG ---
        const FLEET_DATA = [
            { id: 'PHL-01', name: 'Philly-Edge-01', city: 'Philadelphia', lat: 39.9526, lng: -75.1652, status: 'healthy', services: 12, uptime: '99.9%' },
            { id: 'MCO-01', name: 'Orlando-Primary', city: 'Orlando', lat: 28.5383, lng: -81.3792, status: 'healthy', services: 8, uptime: '98.4%' },
            { id: 'LPA-01', name: 'Maspalomas-Relay', city: 'Maspalomas', lat: 27.7606, lng: -15.5860, status: 'warning', services: 4, uptime: '92.1%' },
            { id: 'LPA-02', name: 'Gran-Canaria-DB', city: 'Gran Canaria', lat: 28.1235, lng: -15.4363, status: 'healthy', services: 15, uptime: '99.9%' },
            { id: 'AMS-01', name: 'AMS-Core-A', city: 'Amsterdam', lat: 52.3676, lng: 4.9041, status: 'healthy', services: 45, uptime: '100%' },
            { id: 'AMS-02', name: 'AMS-Core-B', city: 'Amsterdam', lat: 52.3676, lng: 4.9041, status: 'healthy', services: 38, uptime: '99.9%' },
            { id: 'AMS-03', name: 'AMS-Backup', city: 'Amsterdam', lat: 52.3676, lng: 4.9041, status: 'error', services: 22, uptime: '45.2%' },
            { id: 'AMS-04', name: 'AMS-Storage-01', city: 'Amsterdam', lat: 52.3676, lng: 4.9041, status: 'healthy', services: 110, uptime: '99.8%' },
            { id: 'AMS-05', name: 'AMS-Edge-99', city: 'Amsterdam', lat: 52.3676, lng: 4.9041, status: 'healthy', services: 5, uptime: '99.9%' },
        ];

        const getStatusColor = (s) => s === 'error' ? '#ff3d3d' : s === 'warning' ? '#f5a623' : '#00e887';

        // Cluster hosts by coordinate
        const clusters = [];
        const groups = {};
        FLEET_DATA.forEach(host => {
            const key = `${host.lat.toFixed(1)},${host.lng.toFixed(1)}`;
            if (!groups[key]) {
                groups[key] = { id: key, city: host.city, lat: host.lat, lng: host.lng, hosts: [], worstStatus: 'healthy' };
                clusters.push(groups[key]);
            }
            groups[key].hosts.push(host);
            if (host.status === 'error') groups[key].worstStatus = 'error';
            else if (host.status === 'warning' && groups[key].worstStatus !== 'error') groups[key].worstStatus = 'warning';
        });

        const svg = d3.select("#fleet-svg");
        const g = d3.select("#map-layer");
        let width = window.innerWidth;
        let height = window.innerHeight;

        const projection = d3.geoMercator().scale(width / 4).center([-20, 45]).translate([width / 2, height / 2]);
        const path = d3.geoPath().projection(projection);

        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
            .then(res => res.json())
            .then(worldData => {
                d3.select("#countries").selectAll("path")
                    .data(topojson.feature(worldData, worldData.objects.countries).features)
                    .enter().append("path").attr("d", path)
                    .attr("fill", "#0a101a").attr("stroke", "#1e293b").attr("stroke-width", 0.5);
                renderNodes();
            });

        function renderNodes() {
            d3.select("#nodes").selectAll("*").remove();
            const nodes = d3.select("#nodes").selectAll("g")
                .data(clusters).enter().append("g")
                .attr("class", "node-group cursor-pointer")
                .on("click", (event, d) => { event.stopPropagation(); showDetail(d); });

            nodes.each(function(d) {
                const [x, y] = projection([d.lng, d.lat]);
                const el = d3.select(this);
                el.append("circle").attr("cx", x).attr("cy", y).attr("r", 20).attr("fill", "rgba(59, 130, 246, 0.05)").attr("class", "hit-area");
                el.append("circle").attr("cx", x).attr("cy", y).attr("r", 15).attr("fill", "none").attr("stroke", getStatusColor(d.worstStatus)).attr("stroke-width", 0.5).attr("class", "pulse");
                el.append("circle").attr("cx", x).attr("cy", y).attr("r", 6).attr("fill", "#030508").attr("stroke", getStatusColor(d.worstStatus)).attr("stroke-width", 2);
                el.append("text").attr("x", x).attr("y", y - 20).attr("text-anchor", "middle").attr("class", "fill-white font-mono text-[10px] font-bold tracking-widest uppercase pointer-events-none").text(d.city);
            });
        }

        const zoom = d3.zoom().scaleExtent([0.5, 15]).on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        function showDetail(cluster) {
            const panel = document.getElementById('detail-panel');
            const header = document.getElementById('panel-header');
            const hostList = document.getElementById('host-list');

            header.innerHTML = `
                <h2 class="text-3xl font-black text-white italic uppercase">${cluster.city}</h2>
                <div class="text-[9px] font-mono tracking-widest uppercase text-blue-400 mt-2">
                    ${cluster.hosts.length} NODES IDENTIFIED // REGION_${cluster.id}
                </div>
            `;

            hostList.innerHTML = cluster.hosts.map(host => {
                // Determine load based on service count (for realism)
                const loadVal = Math.min(98, (host.services * 0.8) + 15).toFixed(1);
                return `
                <div class="bg-white/[0.03] border border-white/5 rounded-lg p-5 group transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full" style="background: ${getStatusColor(host.status)}; box-shadow: 0 0 8px ${getStatusColor(host.status)}"></div>
                            <span class="font-bold text-white uppercase text-sm">${host.name}</span>
                        </div>
                        <span class="text-[9px] font-mono text-slate-500">${host.id}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center font-mono">
                        <div class="bg-black/60 p-2 rounded border border-white/5">
                            <div class="text-[7px] text-slate-500 uppercase mb-1">Services</div>
                            <div class="text-xs font-bold text-blue-400">${host.services}</div>
                        </div>
                        <div class="bg-black/60 p-2 rounded border border-white/5">
                            <div class="text-[7px] text-slate-500 uppercase mb-1">Uptime</div>
                            <div class="text-xs font-bold text-emerald-400">${host.uptime}</div>
                        </div>
                        <div class="bg-black/60 p-2 rounded border border-white/5">
                            <div class="text-[7px] text-slate-500 uppercase mb-1">Load</div>
                            <div class="text-xs font-bold text-amber-500">${loadVal}%</div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            panel.classList.remove('translate-x-full');
        }

        document.getElementById('close-panel').addEventListener('click', () => document.getElementById('detail-panel').classList.add('translate-x-full'));
        document.getElementById('bg-click-surface').addEventListener('click', () => document.getElementById('detail-panel').classList.add('translate-x-full'));

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            projection.scale(width / 4).translate([width / 2, height / 2]);
            d3.select("#countries").selectAll("path").attr("d", path);
            renderNodes();
        });
    </script>
</body>
</html>
