<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLEET_OPS // LCARS</title>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #080a0f;
      --bg2:         #0d1018;
      --bg3:         #121520;

      /* LCARS status colors */
      --up:          #00e5c8;
      --up-dim:      rgba(0,229,200,0.12);
      --warn:        #f5a623;
      --warn-dim:    rgba(245,166,35,0.12);
      --down:        #ff3b5c;
      --down-dim:    rgba(255,59,92,0.12);
      --unknown:     #4a5568;
      --unknown-dim: rgba(74,85,104,0.12);

      /* LCARS chrome colors */
      --lcars-tan:   #ffb84d;
      --lcars-blue:  #9b9eff;
      --lcars-pink:  #cc88ff;
      --lcars-coral: #ff8c69;
      --lcars-teal:  #66cccc;

      --text:        #c8dce8;
      --text-dim:    #3a5060;
      --text-bright: #ffffff;
      --mono:        'Share Tech Mono', monospace;
      --display:     'Antonio', sans-serif;

      --header-h:    64px;
      --elbow-w:     180px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LCARS HEADER ──────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--bg);
      display: flex;
      align-items: stretch;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid rgba(255,255,255,0.04);
    }

    /* left elbow */
    .hdr-elbow {
      width: var(--elbow-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding-right: 0;
    }
    .hdr-elbow-top {
      height: 18px;
      background: var(--lcars-tan);
      width: 100%;
      border-radius: 18px 0 0 0;
    }
    .hdr-elbow-pill {
      flex: 1;
      background: var(--lcars-tan);
      width: 52px;
      border-radius: 0 0 0 18px;
    }

    /* title block */
    .hdr-title-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px;
      gap: 2px;
      flex-shrink: 0;
    }
    .hdr-title {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
      color: var(--lcars-tan);
      letter-spacing: 4px;
      line-height: 1;
      text-transform: uppercase;
    }
    .hdr-subtitle {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* header stats bar */
    .hdr-stats {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 0;
    }
    .hdr-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      border-right: 1px solid rgba(255,255,255,0.06);
      gap: 2px;
    }
    .hdr-stat-val {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 700;
      color: var(--up);
      line-height: 1;
    }
    .hdr-stat-val.warn { color: var(--warn); }
    .hdr-stat-val.down { color: var(--down); }
    .hdr-stat-lbl {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* right info */
    .hdr-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      padding: 0 20px 0 16px;
      gap: 3px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .hdr-right .src { color: var(--lcars-blue); }
    #sync-age { color: var(--warn); }
    #sync-age.fresh { color: var(--up); }

    /* right elbow */
    .hdr-elbow-right {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .hdr-elbow-right-top {
      height: 18px;
      background: var(--lcars-blue);
      width: 100%;
      border-radius: 0 18px 0 0;
    }
    .hdr-elbow-right-pill {
      flex: 1;
      background: var(--lcars-blue);
      width: 52px;
      border-radius: 0 0 18px 0;
      align-self: flex-end;
    }

    /* ── SIDE RAIL + CONTENT LAYOUT ────────────────── */
    #layout {
      display: flex;
      min-height: calc(100vh - var(--header-h));
    }

    /* left rail */
    #rail {
      width: var(--elbow-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 0 16px 16px;
    }
    .rail-block {
      height: 36px;
      border-radius: 18px 0 0 18px;
      background: var(--lcars-pink);
      opacity: 0.6;
    }
    .rail-block:nth-child(2) { background: var(--lcars-coral); height: 20px; opacity: 0.5; }
    .rail-block:nth-child(3) { background: var(--lcars-teal);  height: 54px; opacity: 0.45; }
    .rail-block:nth-child(4) { background: var(--lcars-tan);   height: 24px; opacity: 0.5; }
    .rail-block:nth-child(5) { background: var(--lcars-blue);  height: 44px; opacity: 0.4; }
    .rail-block:nth-child(6) { background: var(--lcars-pink);  height: 20px; opacity: 0.45; }
    .rail-block:nth-child(7) { background: var(--lcars-coral); height: 60px; opacity: 0.4; }
    .rail-block:nth-child(8) { background: var(--lcars-teal);  height: 28px; opacity: 0.45; }
    .rail-block:nth-child(9) { background: var(--lcars-tan);   height: 36px; opacity: 0.4; }

    /* main content */
    #main {
      flex: 1;
      min-width: 0;
      padding: 16px 16px 16px 8px;
    }

    /* ── GRID ───────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      max-width: 1400px;
    }

    /* ── TILE ───────────────────────────────────────── */
    .tile {
      background: var(--bg2);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.15s;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .tile:hover { background: var(--bg3); }

    /* thick left bar = LCARS elbow feel */
    .tile-lbar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--up);
    }
    .tile.status-down .tile-lbar  { background: var(--down); }
    .tile.status-warn .tile.tile-lbar { background: var(--warn); }

    /* tile header — LCARS pill style */
    .tile-head {
      display: flex;
      align-items: center;
      padding: 0 10px 0 16px;
      height: 36px;
      flex-shrink: 0;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
    }

    .tile-name {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tile.status-up   .tile-name { color: var(--up); }
    .tile.status-down .tile-name { color: var(--down); }
    .tile.status-warn .tile-name { color: var(--warn); }
    .tile.status-unknown .tile-name { color: var(--unknown); }

    .tile-ping {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .tile-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--up);
    }
    .tile.status-down .tile-dot    { background: var(--down); }
    .tile.status-warn .tile-dot    { background: var(--warn); }
    .tile.status-unknown .tile-dot { background: var(--unknown); }

    .tile-role {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 10px 4px 16px;
      flex-shrink: 0;
    }

    /* P services */
    .tile-primary {
      padding: 4px 10px 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .p-service { display: flex; flex-direction: column; gap: 2px; }
    .p-svc-name {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .p-svc-metric {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .p-svc-metric .val  { color: var(--text-bright); }
    .p-svc-metric .ok   { color: var(--up); }
    .p-svc-metric .warn { color: var(--warn); }
    .p-svc-metric .err  { color: var(--down); }

    .vram-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .vram-bar-fill { height: 100%; background: var(--up); border-radius: 2px; transition: width 0.4s; }
    .vram-bar-fill.warn { background: var(--warn); }
    .vram-bar-fill.crit { background: var(--down); }

    /* S service dots */
    .tile-secondary {
      padding: 5px 10px 8px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .s-dot-wrap { display: flex; align-items: center; gap: 4px; }
    .s-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--up);
    }
    .s-dot.down    { background: var(--down); }
    .s-dot.warn    { background: var(--warn); }
    .s-dot.unknown { background: var(--unknown); }
    .s-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.5px; }

    /* ── MODAL OVERLAY ──────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #overlay.open { opacity: 1; pointer-events: all; }

    /* ── MODAL ──────────────────────────────────────── */
    #modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(860px, 96vw);
      max-height: 88vh;
      background: var(--bg);
      z-index: 201;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      border-radius: 4px;
      overflow: hidden;
    }
    #modal.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    /* modal — LCARS top bar */
    #modal-topbar {
      display: flex;
      align-items: stretch;
      height: 52px;
      flex-shrink: 0;
    }
    .modal-tb-pill {
      width: 140px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .modal-tb-pill-top {
      flex: 1;
      background: var(--lcars-tan);
      border-radius: 26px 0 0 0;
    }
    .modal-tb-pill-bot {
      height: 10px;
      background: var(--bg);
    }
    .modal-tb-center {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      border-bottom: 3px solid var(--lcars-tan);
    }
    #modal-title {
      font-family: var(--display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-bright);
      text-transform: uppercase;
    }
    #modal-status-badge {
      font-size: 11px;
      letter-spacing: 2px;
      padding: 3px 12px;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }
    #modal-status-badge.up      { background: var(--up-dim);   color: var(--up);   border: 1px solid var(--up); }
    #modal-status-badge.down    { background: var(--down-dim); color: var(--down); border: 1px solid var(--down); }
    #modal-status-badge.warn    { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn); }
    #modal-status-badge.unknown { background: var(--unknown-dim); color: var(--unknown); border: 1px solid var(--unknown); }

    .modal-tb-close-wrap {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .modal-tb-close-top {
      flex: 1;
      background: var(--down);
      border-radius: 0 26px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      color: #000;
      letter-spacing: 2px;
      transition: opacity 0.15s;
    }
    .modal-tb-close-top:hover { opacity: 0.8; }
    .modal-tb-close-bot { height: 10px; background: var(--bg); }

    /* modal body */
    #modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #modal-body::-webkit-scrollbar { width: 3px; }
    #modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    /* modal bottom rail */
    #modal-bottombar {
      height: 14px;
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      padding: 0 0 0 0;
    }
    .mbb-seg {
      height: 100%;
      background: var(--lcars-blue);
      opacity: 0.5;
      border-radius: 0 0 0 0;
    }
    .mbb-seg:first-child { width: 140px; border-radius: 0 0 0 4px; background: var(--lcars-tan); }
    .mbb-seg:last-child  { flex: 1; border-radius: 0 0 4px 0; }

    /* ── MODAL SECTIONS ─────────────────────────────── */
    .m-section-title {
      font-size: 9px;
      color: var(--lcars-tan);
      letter-spacing: 3px;
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,184,77,0.2);
      margin-bottom: 10px;
    }

    /* host info grid */
    .m-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .m-info-cell {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 3px;
      padding: 8px 10px;
    }
    .m-info-lbl {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .m-info-val {
      font-size: 12px;
      color: var(--text-bright);
      word-break: break-all;
    }
    .m-info-val.up   { color: var(--up); }
    .m-info-val.down { color: var(--down); }
    .m-info-val.warn { color: var(--warn); }

    /* service cards */
    .m-svc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 8px;
    }
    .m-svc-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 3px;
      padding: 10px 12px;
      border-left: 3px solid var(--unknown);
    }
    .m-svc-card.up   { border-left-color: var(--up); }
    .m-svc-card.down { border-left-color: var(--down); }
    .m-svc-card.warn { border-left-color: var(--warn); }

    .m-svc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .m-svc-name {
      font-family: var(--display);
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--text-bright);
      text-transform: uppercase;
    }
    .m-svc-badge {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 2px;
      letter-spacing: 1px;
    }
    .m-svc-badge.P { background: rgba(155,158,255,0.15); color: var(--lcars-blue); border: 1px solid rgba(155,158,255,0.3); }
    .m-svc-badge.S { background: rgba(255,255,255,0.04); color: var(--text-dim);   border: 1px solid rgba(255,255,255,0.07); }

    .m-svc-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      margin-bottom: 3px;
      gap: 8px;
    }
    .m-svc-row .lbl { color: var(--text-dim); flex-shrink: 0; letter-spacing: 1px; }
    .m-svc-row .val { color: var(--text-bright); text-align: right; word-break: break-all; }
    .m-svc-row .val.up   { color: var(--up); }
    .m-svc-row .val.down { color: var(--down); }
    .m-svc-row .val.warn { color: var(--warn); }

    .m-vram-wrap {
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
      margin: 4px 0 2px;
    }
    .m-vram-fill { height: 100%; background: var(--up); border-radius: 2px; }
    .m-vram-fill.warn { background: var(--warn); }
    .m-vram-fill.crit { background: var(--down); }

    /* raw JSON */
    .m-raw-toggle {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 0 4px;
      display: block;
      letter-spacing: 1px;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
    }
    .m-raw-toggle:hover { color: var(--lcars-tan); }
    .m-raw-pre {
      font-family: var(--mono);
      font-size: 9px;
      color: #3a5060;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 3px;
      padding: 10px;
      overflow-x: auto;
      white-space: pre;
      display: none;
      margin-top: 4px;
      line-height: 1.7;
    }
    .m-raw-pre.open { display: block; }

    /* ── FOOTER ─────────────────────────────────────── */
    #footer {
      text-align: center;
      padding: 10px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      border-top: 1px solid rgba(255,255,255,0.03);
    }
    #footer a {
      color: var(--lcars-blue);
      text-decoration: none;
      margin-left: 16px;
    }
    #footer a:hover { color: var(--lcars-tan); }

    /* loading / error */
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 300px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #error-msg {
      display: none;
      text-align: center;
      padding: 40px;
      font-size: 11px;
      color: var(--down);
      letter-spacing: 1px;
    }

    /* blinking cursor on loading */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #loading::after {
      content: '█';
      margin-left: 4px;
      animation: blink 1s infinite;
      color: var(--up);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header">
    <div class="hdr-elbow">
      <div class="hdr-elbow-top"></div>
      <div class="hdr-elbow-pill"></div>
    </div>
    <div class="hdr-title-block">
      <div class="hdr-title">FLEET_OPS</div>
      <div class="hdr-subtitle">LCARS INTERFACE</div>
    </div>
    <div class="hdr-stats">
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="h-hosts">–/–</div>
        <div class="hdr-stat-lbl">HOSTS</div>
      </div>
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="h-svc">–/–</div>
        <div class="hdr-stat-lbl">SERVICES</div>
      </div>
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="h-pub">–/–</div>
        <div class="hdr-stat-lbl">PUBLIC</div>
      </div>
    </div>
    <div class="hdr-right">
      <span>SRC: <span class="src" id="h-src">–</span></span>
      <span>T: <span id="h-time">–</span></span>
      <span id="sync-age">–</span>
    </div>
    <div class="hdr-elbow-right">
      <div class="hdr-elbow-right-top"></div>
      <div class="hdr-elbow-right-pill"></div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div id="layout">
    <div id="rail">
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
      <div class="rail-block"></div>
    </div>
    <div id="main">
      <div id="grid">
        <div id="loading">INITIALIZING LCARS</div>
      </div>
      <div id="error-msg"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    FLEET_OPS // LCARS INTERFACE
    <a id="altFeedLink" href="#">BACKUP FEED</a>
  </div>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <!-- MODAL -->
  <div id="modal">
    <div id="modal-topbar">
      <div class="modal-tb-pill">
        <div class="modal-tb-pill-top"></div>
        <div class="modal-tb-pill-bot"></div>
      </div>
      <div class="modal-tb-center">
        <div id="modal-title">–</div>
        <div id="modal-status-badge" class="unknown">UNKNOWN</div>
        <div id="modal-role" style="font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-left:auto"></div>
      </div>
      <div class="modal-tb-close-wrap">
        <div class="modal-tb-close-top" id="modal-close">CLOSE</div>
        <div class="modal-tb-close-bot"></div>
      </div>
    </div>
    <div id="modal-body"></div>
    <div id="modal-bottombar">
      <div class="mbb-seg"></div>
      <div class="mbb-seg" style="width:40px;background:var(--lcars-pink)"></div>
      <div class="mbb-seg" style="width:60px;background:var(--lcars-coral)"></div>
      <div class="mbb-seg"></div>
    </div>
  </div>

  <script>
    // ── API / ROUTING ────────────────────────────────
    const WARN_MS = 3500;
    const params  = new URLSearchParams(window.location.search);
    const isBkp   = params.has('bkp');
    const API_URL = isBkp
      ? 'https://fleet-bkp.ldmathes.cc/api/status'
      : 'https://fleet.ldmathes.cc/api/status';

    document.getElementById('altFeedLink').href = isBkp
      ? 'https://fleet.ldmathes.cc/tiles-st/index.html'
      : 'https://fleet-bkp.ldmathes.cc/tiles-st/index.html?bkp';

    let lastData      = null;
    let lastTimestamp = null;
    let ageTimer      = null;

    // ── PARSERS (identical to tiles/index.html) ──────
    function parseVRAM(detail) {
      if (!detail) return null;
      const m = detail.match(/VRAM:\s*([\d.]+)GB\s*\/\s*([\d.]+)GB/);
      return m ? { used: parseFloat(m[1]), total: parseFloat(m[2]) } : null;
    }
    function parseGPU(detail) {
      if (!detail) return null;
      const m = detail.match(/GPU:\s*cuda:\d+\s+(.+?)\s*(?::|·|\u00b7|$)/);
      return m ? m[1].trim() : null;
    }
    function parseQueue(detail) {
      if (!detail) return null;
      const m = detail.match(/Queue:\s*(.+?)(?:\s*·|\s*$)/);
      return m ? m[1].trim() : null;
    }
    function parseOllama(detail) {
      if (!detail) return null;
      const m = detail.match(/(\d+)\s+models?\s+available\s*[·\u00b7]\s*(.+)/);
      return m ? { count: parseInt(m[1]), active: m[2].trim() } : null;
    }
    function parsePlex(detail) {
      if (!detail) return null;
      const streams = detail.match(/(\d+)\s+active\s+streams?/i);
      const remote  = detail.match(/Remote:\s*(\w+)/i);
      const libs    = detail.match(/(\d+)\s+libraries?/i);
      return {
        streams: streams ? parseInt(streams[1]) : 0,
        remote:  remote  ? remote[1] : null,
        libs:    libs    ? parseInt(libs[1]) : null,
      };
    }
    function parseSyncthing(detail) {
      if (!detail) return null;
      const folders = detail.match(/(\d+)\s+folders?/i);
      const state   = detail.match(/^(\w+)/);
      return {
        state:   state   ? state[1] : null,
        folders: folders ? parseInt(folders[1]) : null,
      };
    }
    function parseHeartbeat(detail) {
      if (!detail) return null;
      const m = detail.match(/(\d+)\s+sec\s+old/);
      return m ? parseInt(m[1]) : null;
    }

    // ── STATUS HELPERS ───────────────────────────────
    function hostStatus(machine) {
      if (machine.host?.status !== 'up') return 'down';
      const anyDown = (machine.services || []).some(s =>
        s.priority === 'P' && s.tailscale_check?.status !== 'up'
      );
      return anyDown ? 'down' : 'up';
    }
    function svcStatus(svc) {
      return svc.tailscale_check?.status || 'unknown';
    }

    // ── TILE PRIMARY METRIC ──────────────────────────
    function renderPrimaryMetric(svc) {
      const status = svcStatus(svc);
      const ct     = svc.check_type || '';
      const detail = svc.tailscale_check?.detail || '';
      let html = '';

      if (svc.name === 'ComfyUI' || ct === 'comfyui') {
        const vram  = parseVRAM(detail);
        const queue = parseQueue(detail);
        if (vram) {
          const pct = Math.round(vram.used / vram.total * 100);
          const bc  = pct > 85 ? 'crit' : pct > 60 ? 'warn' : '';
          html += `<div class="p-svc-metric"><span class="val">${vram.used}/${vram.total}GB</span><span style="color:var(--text-dim)"> VRAM</span></div>
          <div class="vram-bar-wrap"><div class="vram-bar-fill ${bc}" style="width:${pct}%"></div></div>`;
        }
        if (queue) {
          html += `<div class="p-svc-metric"><span class="${queue==='idle'?'ok':'warn'}">${queue.toUpperCase()}</span></div>`;
        }
      } else if (svc.name === 'Ollama' || ct === 'ollama') {
        const ol = parseOllama(detail);
        if (ol) {
          html += `<div class="p-svc-metric"><span class="val">${ol.count}</span><span style="color:var(--text-dim)"> models</span></div>
          <div class="p-svc-metric"><span class="${ol.active==='none active'?'ok':'warn'}">${ol.active}</span></div>`;
        }
      } else if (svc.name === 'Plex' || ct === 'plex') {
        const pl = parsePlex(detail);
        if (pl) {
          html += `<div class="p-svc-metric">
            <span class="${pl.streams>0?'warn':'ok'} val">${pl.streams}</span>
            <span style="color:var(--text-dim)"> streams</span>
            ${pl.remote ? `<span style="color:var(--text-dim)"> · </span><span class="ok">${pl.remote}</span>` : ''}
          </div>`;
          if (pl.libs !== null) html += `<div class="p-svc-metric"><span style="color:var(--text-dim)">${pl.libs} libraries</span></div>`;
        }
      } else if (ct === 'openwebui') {
        const ms = svc.tailscale_check?.response_time_ms;
        html += `<div class="p-svc-metric"><span class="${status==='up'?'ok':'err'}">${status.toUpperCase()}</span>${ms?`<span style="color:var(--text-dim)"> · ${ms}ms</span>`:''}</div>`;
      } else if (ct === 'flask') {
        const ms = svc.tailscale_check?.response_time_ms;
        html += `<div class="p-svc-metric"><span class="${status==='up'?'ok':'err'}">${detail||status.toUpperCase()}</span>${ms?`<span style="color:var(--text-dim)"> · ${ms}ms</span>`:''}</div>`;
      } else {
        html += `<div class="p-svc-metric"><span class="${status==='up'?'ok':'err'}">${status.toUpperCase()}</span></div>`;
      }
      return html;
    }

    // ── RENDER TILE ──────────────────────────────────
    function renderTile(machine) {
      const status = hostStatus(machine);
      const ping   = machine.host?.response_time_ms;
      const pSvcs  = (machine.services || []).filter(s => s.priority === 'P');
      const sSvcs  = (machine.services || []).filter(s => s.priority === 'S');

      let primaryHtml = '';
      for (const svc of pSvcs) {
        primaryHtml += `
          <div class="p-service">
            <div class="p-svc-name">${svc.name}</div>
            ${renderPrimaryMetric(svc)}
          </div>`;
      }
      if (!primaryHtml) primaryHtml = `<div class="p-svc-metric" style="color:var(--text-dim)">NO PRIMARY SERVICES</div>`;

      let secondaryHtml = '';
      for (const svc of sSvcs) {
        const ss = svcStatus(svc);
        secondaryHtml += `<div class="s-dot-wrap" title="${svc.name}: ${ss}">
          <div class="s-dot ${ss}"></div>
          <span class="s-label">${svc.name}</span>
        </div>`;
      }

      const tile = document.createElement('div');
      tile.className = `tile status-${status}`;
      tile.dataset.name = machine.machine.display_name;
      tile.innerHTML = `
        <div class="tile-lbar"></div>
        <div class="tile-head">
          <span class="tile-name">${machine.machine.display_name}</span>
          <span class="tile-ping">${ping != null ? ping+'ms' : '–'}</span>
          <span class="tile-dot"></span>
        </div>
        <div class="tile-role">${machine.machine.primary_role || ''}</div>
        <div class="tile-primary">${primaryHtml}</div>
        ${secondaryHtml ? `<div class="tile-secondary">${secondaryHtml}</div>` : ''}
      `;

      tile.addEventListener('click', () => openModal(machine));
      return tile;
    }

    // ── MODAL ────────────────────────────────────────
    function openModal(machine) {
      const status = hostStatus(machine);
      const ping   = machine.host?.response_time_ms;
      const ip     = machine.machine.tailscale_ip;
      const os     = machine.machine.os || '–';
      const dur    = machine.poll?.poll_duration_ms;

      document.getElementById('modal-title').textContent = machine.machine.display_name.toUpperCase();
      document.getElementById('modal-role').textContent  = machine.machine.primary_role || '';

      const badge = document.getElementById('modal-status-badge');
      badge.textContent = status.toUpperCase();
      badge.className   = status;

      // update top pill colour to match status
      const pillTop = document.querySelector('.modal-tb-pill-top');
      pillTop.style.background = status === 'up' ? 'var(--up)' : status === 'down' ? 'var(--down)' : 'var(--warn)';

      // ── HOST INFO ──
      let html = `<div class="m-section-title">HOST INFORMATION</div>
        <div class="m-info-grid">
          <div class="m-info-cell"><div class="m-info-lbl">STATUS</div><div class="m-info-val ${status}">${status.toUpperCase()}</div></div>
          <div class="m-info-cell"><div class="m-info-lbl">LATENCY</div><div class="m-info-val">${ping != null ? ping+'ms' : '–'}</div></div>
          <div class="m-info-cell"><div class="m-info-lbl">TAILSCALE IP</div><div class="m-info-val" style="font-size:11px">${ip || '–'}</div></div>
          <div class="m-info-cell"><div class="m-info-lbl">OS</div><div class="m-info-val">${os}</div></div>
          ${dur != null ? `<div class="m-info-cell"><div class="m-info-lbl">POLL DURATION</div><div class="m-info-val">${dur}ms</div></div>` : ''}
          ${machine.host?.detail ? `<div class="m-info-cell" style="grid-column:1/-1"><div class="m-info-lbl">DETAIL</div><div class="m-info-val" style="font-size:10px;color:var(--text)">${machine.host.detail}</div></div>` : ''}
        </div>`;

      // ── PRIMARY SERVICES ──
      const pSvcs = (machine.services || []).filter(s => s.priority === 'P');
      const sSvcs = (machine.services || []).filter(s => s.priority === 'S');

      if (pSvcs.length) {
        html += `<div><div class="m-section-title">PRIMARY SERVICES</div><div class="m-svc-grid">`;
        html += pSvcs.map(s => renderModalService(s)).join('');
        html += `</div></div>`;
      }
      if (sSvcs.length) {
        html += `<div><div class="m-section-title">SECONDARY SERVICES</div><div class="m-svc-grid">`;
        html += sSvcs.map(s => renderModalService(s)).join('');
        html += `</div></div>`;
      }

      // ── RAW JSON ──
      html += `
        <div>
          <div class="m-section-title">RAW DATA</div>
          <button class="m-raw-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ HIDE JSON':'▼ SHOW JSON'">▼ SHOW JSON</button>
          <pre class="m-raw-pre">${JSON.stringify(machine, null, 2)}</pre>
        </div>`;

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function renderModalService(svc) {
      const ss     = svcStatus(svc);
      const detail = svc.tailscale_check?.detail || '';
      const ms     = svc.tailscale_check?.response_time_ms;
      const ct     = svc.check_type || '';

      let rows = `
        <div class="m-svc-row"><span class="lbl">STATUS</span><span class="val ${ss}">${ss.toUpperCase()}</span></div>
        ${ms != null ? `<div class="m-svc-row"><span class="lbl">TS LATENCY</span><span class="val">${ms}ms</span></div>` : ''}
      `;

      if (svc.name === 'ComfyUI' || ct === 'comfyui') {
        const vram  = parseVRAM(detail);
        const gpu   = parseGPU(detail);
        const queue = parseQueue(detail);
        if (gpu)   rows += `<div class="m-svc-row"><span class="lbl">GPU</span><span class="val">${gpu}</span></div>`;
        if (vram) {
          const pct = Math.round(vram.used / vram.total * 100);
          const bc  = pct > 85 ? 'crit' : pct > 60 ? 'warn' : '';
          rows += `<div class="m-svc-row"><span class="lbl">VRAM</span><span class="val">${vram.used}GB / ${vram.total}GB (${pct}%)</span></div>
          <div class="m-vram-wrap"><div class="m-vram-fill ${bc}" style="width:${pct}%"></div></div>`;
        }
        if (queue) rows += `<div class="m-svc-row"><span class="lbl">QUEUE</span><span class="val">${queue}</span></div>`;

      } else if (svc.name === 'Ollama' || ct === 'ollama') {
        const ol = parseOllama(detail);
        if (ol) {
          rows += `<div class="m-svc-row"><span class="lbl">MODELS</span><span class="val">${ol.count} available</span></div>
          <div class="m-svc-row"><span class="lbl">ACTIVE</span><span class="val">${ol.active}</span></div>`;
        }

      } else if (svc.name === 'Plex' || ct === 'plex') {
        const pl = parsePlex(detail);
        if (pl) {
          rows += `<div class="m-svc-row"><span class="lbl">STREAMS</span><span class="val">${pl.streams} active</span></div>`;
          if (pl.remote) rows += `<div class="m-svc-row"><span class="lbl">REMOTE</span><span class="val">${pl.remote}</span></div>`;
          if (pl.libs)   rows += `<div class="m-svc-row"><span class="lbl">LIBRARIES</span><span class="val">${pl.libs}</span></div>`;
          if (detail)    rows += `<div class="m-svc-row" style="flex-direction:column;gap:2px"><span class="lbl">DETAIL</span><span class="val" style="font-size:9px">${detail}</span></div>`;
        }

      } else if (svc.name === 'Syncthing' || ct === 'syncthing') {
        const st = parseSyncthing(detail);
        if (st) {
          if (st.state)   rows += `<div class="m-svc-row"><span class="lbl">STATE</span><span class="val">${st.state}</span></div>`;
          if (st.folders) rows += `<div class="m-svc-row"><span class="lbl">FOLDERS</span><span class="val">${st.folders}</span></div>`;
        }
        if (detail) rows += `<div class="m-svc-row" style="flex-direction:column;gap:2px"><span class="lbl">DETAIL</span><span class="val" style="font-size:9px">${detail}</span></div>`;

      } else if (ct === 'onedrive_heartbeat') {
        const age = parseHeartbeat(detail);
        if (age != null) {
          const ac = age > 120 ? 'down' : age > 60 ? 'warn' : 'up';
          rows += `<div class="m-svc-row"><span class="lbl">AGE</span><span class="val ${ac}">${age}s</span></div>`;
        }
        if (detail) rows += `<div class="m-svc-row"><span class="lbl">DETAIL</span><span class="val">${detail}</span></div>`;

      } else if (detail) {
        rows += `<div class="m-svc-row"><span class="lbl">DETAIL</span><span class="val">${detail}</span></div>`;
      }

      // public check
      if (svc.public_check) {
        const pc = svc.public_check;
        rows += `<div class="m-svc-row"><span class="lbl">PUBLIC</span><span class="val ${pc.status}">${pc.status.toUpperCase()} · ${pc.http_code} · ${pc.response_time_ms}ms</span></div>
        <div class="m-svc-row"><span class="lbl">URL</span><span class="val" style="font-size:9px">${pc.url}</span></div>`;
      }

      return `
        <div class="m-svc-card ${ss}">
          <div class="m-svc-head">
            <span class="m-svc-name">${svc.name}</span>
            <span class="m-svc-badge ${svc.priority}">${svc.priority}</span>
          </div>
          ${rows}
        </div>`;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', closeModal);

    // ── HEADER UPDATE ────────────────────────────────
    function updateHeader(data) {
      const s = data.summary;
      const setVal = (id, up, total) => {
        const el = document.getElementById(id);
        el.textContent = `${up}/${total}`;
        el.className = 'hdr-stat-val' + (up < total ? (up === 0 ? ' down' : ' warn') : '');
      };
      setVal('h-hosts', s.machines_up,        s.machines_total);
      setVal('h-svc',   s.services_up,         s.services_total);
      setVal('h-pub',   s.public_endpoints_up, s.public_endpoints_total);
      document.getElementById('h-src').textContent  = data.meta.checker_host.toUpperCase();
      lastTimestamp = new Date(data.meta.timestamp_utc);
      document.getElementById('h-time').textContent = lastTimestamp.toLocaleTimeString();
    }

    function startAgeTimer() {
      if (ageTimer) clearInterval(ageTimer);
      ageTimer = setInterval(() => {
        if (!lastTimestamp) return;
        const age = Math.floor((Date.now() - lastTimestamp) / 1000);
        const el  = document.getElementById('sync-age');
        el.textContent = age + 's AGO';
        el.className   = age < 60 ? 'fresh' : '';
      }, 1000);
    }

    // ── RENDER ───────────────────────────────────────
    function render(data) {
      updateHeader(data);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const machines = [...(data.machines || [])].sort((a, b) =>
        a.machine.display_name.localeCompare(b.machine.display_name)
      );
      for (const machine of machines) {
        grid.appendChild(renderTile(machine));
      }
    }

    // ── FETCH ────────────────────────────────────────
    async function refresh() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        lastData = data;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        render(data);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        const em = document.getElementById('error-msg');
        em.style.display = 'block';
        em.textContent = `FETCH ERROR: ${err.message}`;
        console.error(err);
      }
    }

    // ── INIT ─────────────────────────────────────────
    refresh();
    startAgeTimer();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
