<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FLEET COMMAND | LCARS TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcars-orange: #ff9900;
            --lcars-gold: #ffcc00;
            --lcars-blue: #99ccff;
            --lcars-periwinkle: #9999ff;
            --lcars-pink: #cc99cc;
            --lcars-red: #cc0000;
            --lcars-bg: #000000;
            --lcars-font: 'Antonio', sans-serif;
            --lcars-amber: #e3b341;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--lcars-bg);
            color: white;
            font-family: var(--lcars-font);
            text-transform: uppercase;
            overflow-x: hidden;
            padding: 20px;
        }

        .lcars-container {
            display: grid;
            grid-template-columns: 150px 1fr;
            grid-template-rows: 100px 1fr 60px;
            gap: 10px;
            height: 95vh;
        }

        /* Sidebar/Elbow Design */
        .sidebar { grid-row: 1 / 3; display: flex; flex-direction: column; gap: 5px; }
        .elbow {
            height: 100px; width: 150px; background: var(--lcars-periwinkle);
            border-top-left-radius: 50px; border-bottom-left-radius: 50px; position: relative;
        }
        .elbow::after {
            content: ""; position: absolute; top: 20px; left: 50px; right: 0; bottom: 0;
            background: var(--lcars-bg); border-top-left-radius: 30px;
        }
        .side-bar-block {
            width: 100px; height: 60px; background: var(--lcars-orange);
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 10px; font-weight: bold; color: black; font-size: 0.9rem;
        }
        .side-bar-block.blue { background: var(--lcars-blue); }
        .side-bar-block.pink { background: var(--lcars-pink); }
        .side-bar-block.gold { background: var(--lcars-gold); }

        /* Header */
        .header {
            grid-column: 2; display: flex; align-items: flex-end; justify-content: space-between;
            border-bottom: 20px solid var(--lcars-periwinkle); border-bottom-right-radius: 40px;
            padding-bottom: 5px; padding-right: 20px;
        }
        .header-title { font-size: 3rem; color: var(--lcars-gold); letter-spacing: 2px; }

        /* Content Area */
        .main-display { grid-column: 2; padding: 20px; overflow-y: auto; scrollbar-width: none; }
        .main-display::-webkit-scrollbar { display: none; }

        .stats-strip { display: flex; gap: 20px; margin-bottom: 30px; border-left: 15px solid var(--lcars-gold); padding-left: 15px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { color: var(--lcars-blue); font-size: 0.8rem; }
        .stat-value { font-size: 1.8rem; color: white; }

        /* Fleet Cards */
        .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }
        .ship-card { background: #0a0a0a; border-left: 8px solid var(--lcars-periwinkle); padding: 12px; position: relative; border-bottom: 1px solid #1a1a1a; }
        .ship-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 8px; padding-bottom: 4px; }
        .ship-name { font-size: 1.3rem; color: var(--lcars-gold); }
        
        .role-tag { font-size: 0.75rem; color: var(--lcars-pink); margin-bottom: 8px; }
        .ip-line { font-size: 0.7rem; color: #444; margin-top: 5px; border-top: 1px solid #222; padding-top: 3px; }

        .service-item { display: flex; flex-direction: column; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
        .service-main { display: flex; justify-content: space-between; align-items: center; }
        .service-name { font-size: 0.9rem; color: var(--lcars-blue); }
        .service-meta { font-size: 0.75rem; color: #666; }
        .service-detail { font-size: 0.7rem; color: #444; font-style: italic; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-up { background: #39d353; box-shadow: 0 0 5px #39d353; }
        .status-down { background: var(--lcars-red); box-shadow: 0 0 5px var(--lcars-red); }

        .stale-warning { display: none; background: var(--lcars-amber); color: black; padding: 5px 20px; font-weight: bold; text-align: center; margin-bottom: 10px; }

        .footer {
            grid-column: 1 / 3; background: var(--lcars-orange); height: 20px;
            border-top-right-radius: 20px; border-top-left-radius: 20px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            font-size: 0.7rem; color: black;
        }
        .footer a { color: black; text-decoration: none; font-weight: bold; }
        .footer a:hover { text-decoration: underline; }

        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(153, 204, 255, 0.05); z-index: 100; pointer-events: none;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        @media (max-width: 768px) {
            .lcars-container { grid-template-columns: 80px 1fr; }
            .sidebar, .elbow { width: 80px; }
            .side-bar-block { width: 60px; }
            .header-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="scanline"></div>

<div class="lcars-container">
    <div class="sidebar">
        <div class="elbow"></div>
        <div class="side-bar-block gold">DATA</div>
        <div class="side-bar-block pink">FLT</div>
        <div class="side-bar-block blue">CMD</div>
        <div class="side-bar-block" style="flex-grow: 1;"></div>
        <div class="side-bar-block gold" style="height: 30px; font-size: 0.6rem;">LCARS-9.0</div>
    </div>

    <header class="header">
        <div class="header-title">FLEET STATUS :: MAIN</div>
        <div id="clock" style="color: var(--lcars-pink); font-size: 1.2rem;">00:00:00</div>
    </header>

    <main class="main-display">
        <div id="staleBanner" class="stale-warning">SENSORS STALE - DATA POTENTIALLY OUTDATED</div>
        
        <section class="stats-strip" id="summary">
            <!-- Populated by JS -->
        </section>

        <div class="fleet-grid" id="fleetGrid">
            <div style="padding: 50px; text-align: center; color: var(--lcars-blue);">ESTABLISHING DATA LINK...</div>
        </div>
    </main>

    <footer class="footer">
        <a id="altFeedLink" href="#">SWITCH FEED</a>
        <span id="metaInfo">STARDATE: INITIALIZING</span>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const isBkp = params.has('bkp');
    const API_URL = isBkp
      ? 'https://fleet-bkp.ldmathes.cc/api/status'
      : 'https://fleet.ldmathes.cc/api/status';

    // Point the footer link to the opposite feed from whichever we're currently on
    document.getElementById('altFeedLink').href = isBkp
      ? 'https://fleet.ldmathes.cc/ST/index.html'
      : 'https://fleet-bkp.ldmathes.cc/ST/index.html?bkp'; 

    const POLL_MS = 30000;
    const STALE_S = 60;
    let lastData = null;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toISOString().split('T')[1].split('.')[0];
    }

    function renderSummary(summary) {
        document.getElementById('summary').innerHTML = `
            <div class="stat-item">
                <span class="stat-label">Ships (Up/Total)</span>
                <span class="stat-value">${summary.machines_up}/${summary.machines_total}</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Services Active</span>
                <span class="stat-value" style="color: var(--lcars-orange)">${summary.services_up}</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Public Endpoints</span>
                <span class="stat-value" style="color: var(--lcars-blue)">${summary.public_endpoints_up}</span>
            </div>
        `;
    }

    function renderShips(machines) {
        const grid = document.getElementById('fleetGrid');
        grid.innerHTML = machines.map(m => {
            const isUp = m.host.status === 'up';
            
            const servicesHtml = (m.services || []).map(s => {
                const tsUp = s.tailscale_check?.status === 'up';
                const pbStatus = s.public_check ? (s.public_check.status === 'up' ? ' [PUB OK]' : ' [PUB ERR]') : '';
                return `
                    <div class="service-item">
                        <div class="service-main">
                            <span class="service-name">
                                <span class="status-dot ${tsUp ? 'status-up' : 'status-down'}"></span>
                                ${s.name} <small style="color:#444">${s.port}</small>
                            </span>
                            <span class="service-meta">
                                ${s.tailscale_check?.response_time_ms ? s.tailscale_check.response_time_ms + 'ms' : ''}
                                <span style="color: var(--lcars-gold)">${pbStatus}</span>
                            </span>
                        </div>
                        <div class="service-detail">${s.tailscale_check?.detail || ''}</div>
                    </div>
                `;
            }).join('');

            return `
                <article class="ship-card" style="border-left-color: ${isUp ? 'var(--lcars-periwinkle)' : 'var(--lcars-red)'}">
                    <div class="ship-header">
                        <span class="ship-name">${m.machine.display_name}</span>
                        <span style="font-size: 0.8rem; color: ${isUp ? '#39d353' : 'var(--lcars-red)'}">
                            ${isUp ? (m.host.response_time_ms + 'ms') : 'OFFLINE'}
                        </span>
                    </div>
                    <div class="role-tag">${m.machine.primary_role}</div>
                    <div class="service-list">${servicesHtml}</div>
                    <div class="ip-line">TS: ${m.machine.tailscale_ip}</div>
                </article>
            `;
        }).join('');
    }

    async function poll() {
        try {
            const res = await fetch(API_URL, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            lastData = data;

            // Handle Stale Data
            const dataTime = new Date(data.meta.timestamp_utc).getTime();
            const now = Date.now();
            const ageS = (now - dataTime) / 1000;
            const isStale = ageS > STALE_S;

            document.getElementById('staleBanner').style.display = isStale ? 'block' : 'none';
            document.querySelector('.header').style.borderBottomColor = isStale ? 'var(--lcars-amber)' : 'var(--lcars-periwinkle)';

            renderSummary(data.summary);
            renderShips(data.machines);
            
            document.getElementById('metaInfo').textContent = 
                `CHECKER: ${(data.meta.checker_host || '—').toUpperCase()} // CYCLE: ${data.meta.cycle_duration_ms || '—'}MS // AGE: ${Math.round(ageS)}S`;
            
        } catch (error) {
            console.error('Data link severed:', error);
            document.getElementById('metaInfo').textContent = `ERROR: ${error.message}`;
            if (!lastData) {
                document.getElementById('fleetGrid').innerHTML = `
                    <div style="grid-column: 1/-1; padding: 40px; border: 2px solid var(--lcars-red); text-align: center;">
                        <h2 style="color: var(--lcars-red)">COMMUNICATIONS FAILURE</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    }

    setInterval(updateClock, 1000);
    setInterval(poll, POLL_MS);
    updateClock();
    poll();
</script>
</body>
</html>
