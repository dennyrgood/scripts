<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FLEET_OPS | TACTICAL COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcars-orange: #ff9900; --lcars-gold: #ffcc00; --lcars-blue: #99ccff;
            --lcars-periwinkle: #9999ff; --lcars-pink: #cc99cc; --lcars-red: #cc0000;
            --lcars-bg: #000000; --status-green: #00ff88; --lcars-amber: #e3b341;
            --font-main: 'Antonio', sans-serif; --font-data: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--lcars-bg); color: white;
            font-family: var(--font-main); text-transform: uppercase;
            height: 100vh; overflow: hidden; display: flex;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        /* LEFT PANEL: ADVANCED TACTICAL DATA */
        #detail-panel {
            width: 480px; height: 100%; border-right: 4px solid var(--lcars-periwinkle);
            display: flex; flex-direction: column; background: rgba(5, 7, 12, 0.95);
            position: relative; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .lcars-bracket {
            position: absolute; right: -14px; top: 15%; height: 70%; width: 10px;
            background: var(--lcars-periwinkle); border-radius: 0 10px 10px 0;
        }

        .panel-header {
            background: var(--lcars-periwinkle); color: black; padding: 15px 25px;
            font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .sub-header {
            background: var(--lcars-bg); color: var(--lcars-pink);
            padding: 5px 20px; font-size: 0.9rem; border-bottom: 2px solid var(--lcars-pink);
            display: flex; justify-content: space-between;
        }

        .data-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .data-cell { border-left: 3px solid var(--lcars-blue); padding-left: 10px; }
        .cell-label { font-size: 0.7rem; color: var(--lcars-periwinkle); }
        .cell-value { font-family: var(--font-data); font-size: 1.1rem; color: var(--lcars-gold); }

        #service-list {
            flex-grow: 1; padding: 0 20px 20px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--lcars-blue) transparent;
        }

        .service-card {
            background: rgba(153, 204, 255, 0.05); border: 1px solid rgba(153, 204, 255, 0.2);
            margin-bottom: 8px; padding: 10px; display: flex; align-items: center;
            justify-content: space-between; border-radius: 4px;
        }

        .service-status-bar { height: 4px; width: 40px; background: var(--status-green); border-radius: 2px; box-shadow: 0 0 8px var(--status-green); }

        /* RIGHT SIDE: ORGANIC SCHEMATIC */
        .schematic-container { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        header {
            height: 85px; border-bottom: 18px solid var(--lcars-orange);
            display: flex; align-items: flex-end; justify-content: flex-end;
            padding: 0 60px 10px 0; margin-left: 30px; border-bottom-right-radius: 40px;
        }

        .header-title { font-size: 2.8rem; font-weight: 700; color: var(--lcars-gold); letter-spacing: 4px; }

        #schematic-stage { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at 80% 50%, #0d1a2b 0%, #000 70%); }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        /* SVG ANIMATIONS & STYLES */
        .conduit { fill: none; stroke-width: 2.5; opacity: 0.4; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .conduit.up { stroke: var(--lcars-blue); }
        .conduit.down { stroke: var(--lcars-red); stroke-width: 5; opacity: 0.8; filter: blur(1px); }
        .conduit.active { opacity: 1; stroke-width: 4; stroke: var(--lcars-gold); filter: drop-shadow(0 0 8px var(--lcars-gold)); }

        .flow-particle { fill: #fff; filter: blur(1px); animation: flow 3s infinite linear; }
        
        .node-group { cursor: pointer; transition: 0.3s; }
        .node-group:hover { filter: brightness(1.4); }
        .node-rect { fill: rgba(0,0,0,0.9); stroke-width: 2; }
        
        .label-main { fill: var(--lcars-gold); font-size: 16px; font-weight: 700; font-family: var(--font-data); }
        .label-sub { fill: var(--lcars-periwinkle); font-size: 11px; }
        .label-meta { fill: var(--status-green); font-size: 10px; font-family: var(--font-data); }

        .hub-ring { animation: rotate 20s infinite linear; transform-origin: 850px 400px; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .alert-overlay {
            position: absolute; inset: 0; pointer-events: none;
            border: 0px solid var(--lcars-red); transition: border-width 0.2s;
            z-index: 1000;
        }
        body.red-alert .alert-overlay { border-width: 15px; animation: flash-red 1.5s infinite; }
        @keyframes flash-red { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        footer { height: 45px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; font-size: 0.85rem; border-top: 4px solid var(--lcars-blue); }
    </style>
</head>
<body id="body">

<div class="alert-overlay"></div>

<div id="detail-panel">
    <div class="lcars-bracket"></div>
    <div class="panel-header">
        <span>TACTICAL_READOUT</span>
        <span id="node-tag" style="font-size: 0.9rem; opacity: 0.7;">00-000</span>
    </div>
    
    <div class="sub-header">
        <span>UNIT STATUS: <span id="unit-status">STANDBY</span></span>
        <span id="stardate-top">SD 47634.4</span>
    </div>

    <div class="data-grid">
        <div class="data-cell">
            <div class="cell-label">DESIGNATION</div>
            <div id="det-name" class="cell-value">---</div>
        </div>
        <div class="data-cell">
            <div class="cell-label">TAILSCALE_IP</div>
            <div id="det-ip" class="cell-value">0.0.0.0</div>
        </div>
        <div class="data-cell">
            <div class="cell-label">PRIMARY_ROLE</div>
            <div id="det-role" class="cell-value">NOT_SET</div>
        </div>
        <div class="data-cell">
            <div class="cell-label">SIGNAL_LATENCY</div>
            <div id="det-lat" class="cell-value">-- MS</div>
        </div>
    </div>

    <div style="padding: 10px 20px; font-size: 0.8rem; color: var(--lcars-periwinkle); border-top: 1px solid #222;">ACTIVE SUBSYSTEMS</div>
    <div id="service-list">
        </div>

    <div style="padding: 20px; display: flex; gap: 5px;">
        <div style="flex: 2; height: 35px; background: var(--lcars-orange); border-radius: 20px 0 0 20px; cursor: pointer; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold;" onclick="location.reload()">RE-INITIALIZE</div>
        <div style="flex: 1; height: 35px; background: var(--lcars-pink);"></div>
        <div style="flex: 1; height: 35px; background: var(--lcars-blue); border-radius: 0 20px 20px 0;"></div>
    </div>
</div>

<div class="schematic-container">
    <header>
        <div class="header-title">FLEET TACTICAL DISPLAY</div>
    </header>

    <div id="schematic-stage">
        <svg id="svgCanvas" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <linearGradient id="conduitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:var(--lcars-blue);stop-opacity:0" />
                    <stop offset="100%" style="stop-color:var(--lcars-blue);stop-opacity:1" />
                </linearGradient>
            </defs>
            
            <g id="conduitGroup"></g>
            
            <g class="hub-ring">
                <circle cx="850" cy="400" r="60" fill="none" stroke="var(--lcars-gold)" stroke-width="1" stroke-dasharray="10 20" />
                <circle cx="850" cy="400" r="45" fill="none" stroke="var(--lcars-pink)" stroke-width="1" stroke-dasharray="5 5" />
            </g>
            <circle cx="850" cy="400" r="25" fill="var(--lcars-gold)" filter="url(#glow)"/>
            <circle cx="850" cy="400" r="12" fill="black" />
            <text x="850" y="445" text-anchor="middle" fill="var(--lcars-gold)" style="font-size: 11px; font-weight: bold; letter-spacing: 2px;">AMSTERDAM_CORE</text>
            
            <g id="nodeGroup"></g>
        </svg>
    </div>

    <footer>
        <div id="metaInfo">SYSTEMS_NOMINAL // ENCRYPTION_ACTIVE</div>
        <div style="display: flex; gap: 30px; align-items: center;">
            <a id="altFeedLink" href="#" style="color: var(--lcars-gold); text-decoration: none; border: 1px solid var(--lcars-gold); padding: 2px 10px;">SWITCH_BAND</a>
            <span style="color: var(--lcars-periwinkle)">LCARS_TACTICAL_V2.0</span>
        </div>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const isBkp = params.has('bkp');
    const API_URL = isBkp ? 'https://fleet-bkp.ldmathes.cc/api/status' : 'https://fleet.ldmathes.cc/api/status';

    function updateDetail(m) {
        document.getElementById('node-tag').textContent = `ID_${Math.random().toString(36).substr(2, 5).toUpperCase()}`;
        document.getElementById('det-name').textContent = m.machine.display_name;
        document.getElementById('det-role').textContent = m.machine.primary_role;
        document.getElementById('det-ip').textContent = m.machine.tailscale_ip;
        document.getElementById('det-lat').textContent = m.host.status === 'up' ? `${m.host.response_time_ms} MS` : 'N/A';
        document.getElementById('unit-status').textContent = m.host.status === 'up' ? 'ACTIVE' : 'OFFLINE';
        document.getElementById('unit-status').style.color = m.host.status === 'up' ? 'var(--status-green)' : 'var(--lcars-red)';

        const list = document.getElementById('service-list');
        list.innerHTML = '';
        m.services.forEach(s => {
            const up = s.tailscale_check.status === 'up';
            const card = document.createElement('div');
            card.className = 'service-card';
            card.innerHTML = `
                <div>
                    <div style="font-size: 0.9rem; font-weight: bold; color: var(--lcars-gold)">${s.name}</div>
                    <div style="font-size: 0.7rem; color: var(--lcars-blue)">PORT: ${s.port} | PRIO: ${s.priority}</div>
                </div>
                <div class="service-status-bar" style="background:${up ? 'var(--status-green)' : 'var(--lcars-red)'}; box-shadow: 0 0 8px ${up ? 'var(--status-green)' : 'var(--lcars-red)'}"></div>
            `;
            list.appendChild(card);
        });

        document.querySelectorAll('.conduit').forEach(c => c.classList.remove('active'));
        const path = document.getElementById('path-' + m.machine.tailscale_name);
        if (path) path.classList.add('active');
    }

    function renderSchematic(data) {
        const conduitGroup = document.getElementById('conduitGroup');
        const nodeGroup = document.getElementById('nodeGroup');
        conduitGroup.innerHTML = ''; nodeGroup.innerHTML = '';

        const machines = data.machines || [];
        const centerX = 850; 
        const centerY = 400;

        machines.forEach((m, i) => {
            const angleSpread = Math.PI * 0.8;
            const angle = (i / (machines.length - 1)) * angleSpread - (angleSpread / 2) + Math.PI;
            const radius = 650;
            const targetX = centerX + Math.cos(angle) * radius;
            const targetY = centerY + Math.sin(angle) * radius;
            
            const isUp = m.host.status === 'up';
            const color = isUp ? 'var(--lcars-blue)' : 'var(--lcars-red)';

            // Advanced Organic Arcs
            const cp1X = centerX - 300;
            const cp2X = centerX - 450;
            const pathD = `M ${centerX} ${centerY} C ${cp1X} ${centerY} ${cp2X} ${targetY} ${targetX + 100} ${targetY}`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("id", 'path-' + m.machine.tailscale_name);
            path.setAttribute("d", pathD);
            path.setAttribute("class", `conduit ${isUp ? 'up' : 'down'}`);
            conduitGroup.appendChild(path);

            if (isUp) {
                const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                particle.setAttribute("r", "2");
                particle.setAttribute("fill", "#fff");
                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animateMotion");
                anim.setAttribute("dur", (Math.random() * 2 + 2) + "s");
                anim.setAttribute("repeatCount", "indefinite");
                anim.setAttribute("path", pathD);
                particle.appendChild(anim);
                conduitGroup.appendChild(particle);
            }

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node-group");
            g.onclick = () => updateDetail(m);

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", targetX - 50); rect.setAttribute("y", targetY - 40);
            rect.setAttribute("width", "200"); rect.setAttribute("height", "80");
            rect.setAttribute("rx", "15"); rect.setAttribute("class", "node-rect");
            rect.setAttribute("stroke", isUp ? 'var(--lcars-periwinkle)' : 'var(--lcars-red)');
            g.appendChild(rect);

            const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t1.setAttribute("x", targetX - 35); t1.setAttribute("y", targetY - 15);
            t1.setAttribute("class", "label-main"); t1.textContent = m.machine.display_name.toUpperCase();
            g.appendChild(t1);

            const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t2.setAttribute("x", targetX - 35); t2.setAttribute("y", targetY + 5);
            t2.setAttribute("class", "label-sub"); t2.textContent = m.machine.primary_role;
            g.appendChild(t2);

            const t3 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t3.setAttribute("x", targetX - 35); t3.setAttribute("y", targetY + 25);
            t3.setAttribute("class", "label-meta");
            t3.setAttribute("fill", isUp ? 'var(--status-green)' : 'var(--lcars-red)');
            t3.textContent = isUp ? `ONLINE // ${m.host.response_time_ms}ms` : 'LINK_SEVERED';
            g.appendChild(t3);

            nodeGroup.appendChild(g);
        });

        const anyDown = machines.some(m => m.host.status !== 'up');
        document.getElementById('body').className = anyDown ? 'red-alert' : '';
        document.getElementById('metaInfo').textContent = anyDown ? "WARNING: FLEET_INTEGRITY_COMPROMISED" : "SYSTEMS_NOMINAL // ENCRYPTION_ACTIVE";
    }

    async function poll() {
        try {
            const res = await fetch(API_URL, { cache: 'no-store' });
            const data = await res.json();
            renderSchematic(data);
            document.getElementById('stardate-top').textContent = `SD ${Math.floor(Date.now()/1000)}`;
        } catch (e) { console.error(e); }
    }

    setInterval(poll, 30000);
    poll();
</script>
</body>
</html>
