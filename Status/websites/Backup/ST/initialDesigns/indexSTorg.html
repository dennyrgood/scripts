<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FLEET COMMAND | ORGANIC SCHEMATIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcars-orange: #ff9900;
            --lcars-gold: #ffcc00;
            --lcars-blue: #99ccff;
            --lcars-periwinkle: #9999ff;
            --lcars-pink: #cc99cc;
            --lcars-red: #cc0000;
            --lcars-bg: #000000;
            --lcars-font: 'Antonio', sans-serif;
            --lcars-amber: #e3b341;
            --status-green: #39d353;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--lcars-bg);
            color: white;
            font-family: var(--lcars-font);
            text-transform: uppercase;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* LCARS Structural Elements */
        .sidebar {
            width: 160px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
        }

        .elbow {
            height: 100px; width: 140px; background: var(--lcars-periwinkle);
            border-top-left-radius: 60px; border-bottom-left-radius: 60px; position: relative;
            margin-bottom: 10px;
        }
        .elbow::after {
            content: ""; position: absolute; top: 20px; left: 40px; right: 0; bottom: 0;
            background: var(--lcars-bg); border-top-left-radius: 40px;
        }

        .side-block {
            width: 110px; height: 50px; background: var(--lcars-orange);
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 10px; font-weight: bold; color: black; font-size: 0.9rem;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 20px 10px 0;
        }

        header {
            height: 80px;
            border-bottom: 15px solid var(--lcars-periwinkle);
            border-bottom-right-radius: 40px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 40px 10px 0;
            margin-bottom: 10px;
        }

        .header-title { font-size: 2.5rem; color: var(--lcars-gold); letter-spacing: 2px; }

        /* The Visual Stage */
        #schematic-stage {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #0a111a 0%, #000 80%);
            border: 1px solid #1a1a1a;
            overflow: hidden;
        }

        svg { width: 100%; height: 100%; }

        .stale-alert {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--lcars-amber); color: black; padding: 5px 30px;
            font-weight: bold; display: none; z-index: 10;
        }

        /* SVG Components */
        .conduit { fill: none; stroke-width: 2; transition: stroke 0.5s; opacity: 0.4; }
        .conduit.up { stroke: var(--status-green); }
        .conduit.down { stroke: var(--lcars-red); stroke-width: 4; opacity: 1; }
        
        .particle { fill: white; filter: blur(1px); }
        
        .node-circle { transition: fill 0.5s; stroke: black; stroke-width: 2; }
        .node-text { font-size: 14px; fill: white; font-weight: bold; pointer-events: none; }
        .node-subtext { font-size: 10px; fill: var(--lcars-blue); pointer-events: none; }

        .hub-glow {
            animation: hub-pulse 4s infinite ease-in-out;
        }
        @keyframes hub-pulse {
            0% { r: 15; opacity: 0.4; }
            50% { r: 40; opacity: 0.1; }
            100% { r: 15; opacity: 0.4; }
        }

        footer {
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 0.8rem;
            color: var(--lcars-orange);
        }
        footer a { color: var(--lcars-blue); text-decoration: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="elbow"></div>
    <div class="side-block gold">STR-01</div>
    <div class="side-block pink">FLT-02</div>
    <div class="side-block blue">NET-03</div>
    <div class="side-block" style="flex-grow: 1; opacity: 0.3;"></div>
    <div class="side-block gold" style="height: 30px; font-size: 0.6rem;">SYS 9.2.1</div>
</div>

<div class="main-container">
    <header id="mainHeader">
        <div class="header-title">FLEET DEPLOYMENT SCHEMATIC</div>
        <div id="summaryText" style="color: var(--lcars-blue); font-size: 1.2rem;">SENSORS NOMINAL</div>
    </header>

    <div id="schematic-stage">
        <div id="staleBanner" class="stale-alert">SENSOR LINK DEGRADED - DATA STALE</div>
        <svg id="svgCanvas" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <g id="conduitGroup"></g>
            <g id="nodeGroup"></g>
            
            <circle id="hubPulse" cx="500" cy="400" r="20" fill="var(--lcars-gold)" class="hub-glow"></circle>
            <circle cx="500" cy="400" r="12" fill="var(--lcars-gold)" id="centerHub"></circle>
            <text x="500" y="430" text-anchor="middle" fill="var(--lcars-gold)" style="font-size: 14px; font-weight: bold;">CHECKER CORE</text>
        </svg>
    </div>

    <footer>
        <div id="metaInfo">STARDATE: INITIALIZING...</div>
        <a id="altFeedLink" href="#">SECONDARY FEED ACCESS</a>
    </footer>
</div>

<script>
    /** * DATA ACCESS LOGIC (Preserved Exactly)
     */
    const params = new URLSearchParams(window.location.search);
    const isBkp = params.has('bkp');
    const API_URL = isBkp
      ? 'https://fleet-bkp.ldmathes.cc/api/status'
      : 'https://fleet.ldmathes.cc/api/status';

    document.getElementById('altFeedLink').href = isBkp
      ? 'https://fleet.ldmathes.cc/panel/index.html'
      : 'https://fleet-bkp.ldmathes.cc/panel/index.html?bkp'; 

    const POLL_MS = 30000;
    const STALE_S = 60;
    let lastData = null;

    const svg = document.getElementById('svgCanvas');
    const conduitGroup = document.getElementById('conduitGroup');
    const nodeGroup = document.getElementById('nodeGroup');

    function createSchematic(data) {
        conduitGroup.innerHTML = '';
        nodeGroup.innerHTML = '';
        
        const machines = data.machines || [];
        const centerX = 500;
        const centerY = 400;
        const radiusX = 380; // Elliptical orbit for wider screens
        const radiusY = 300;
        
        machines.forEach((m, i) => {
            const angle = (i / machines.length) * Math.PI * 2 - Math.PI / 2;
            const targetX = centerX + Math.cos(angle) * radiusX;
            const targetY = centerY + Math.sin(angle) * radiusY;
            
            const isUp = m.host.status === 'up';
            const statusColor = isUp ? 'var(--status-green)' : 'var(--lcars-red)';

            // Draw organic "Arc" Conduit (Quadratic Bezier)
            // The control point is calculated to create a pleasant curve away from the center
            const cpX = centerX + Math.cos(angle - 0.4) * (radiusX * 0.4);
            const cpY = centerY + Math.sin(angle - 0.4) * (radiusY * 0.4);
            
            const pathD = `M ${centerX} ${centerY} Q ${cpX} ${cpY} ${targetX} ${targetY}`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathD);
            path.setAttribute("class", `conduit ${isUp ? 'up' : 'down'}`);
            path.setAttribute("filter", "url(#glow)");
            conduitGroup.appendChild(path);

            // Flow Particles (Active links only)
            if (isUp) {
                const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                particle.setAttribute("r", "2.5");
                particle.setAttribute("class", "particle");
                
                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animateMotion");
                anim.setAttribute("dur", `${Math.max(0.8, m.host.response_time_ms / 15)}s`);
                anim.setAttribute("repeatCount", "indefinite");
                anim.setAttribute("path", pathD);
                particle.appendChild(anim);
                conduitGroup.appendChild(particle);
            }

            // Machine Nodes
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", targetX);
            circle.setAttribute("cy", targetY);
            circle.setAttribute("r", "14");
            circle.setAttribute("fill", statusColor);
            circle.setAttribute("class", "node-circle");
            circle.setAttribute("filter", "url(#glow)");
            
            const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
            name.setAttribute("x", targetX + (targetX > centerX ? 25 : -25));
            name.setAttribute("y", targetY - 5);
            name.setAttribute("text-anchor", targetX > centerX ? "start" : "end");
            name.setAttribute("class", "node-text");
            name.textContent = m.machine.display_name;

            const role = document.createElementNS("http://www.w3.org/2000/svg", "text");
            role.setAttribute("x", targetX + (targetX > centerX ? 25 : -25));
            role.setAttribute("y", targetY + 12);
            role.setAttribute("text-anchor", targetX > centerX ? "start" : "end");
            role.setAttribute("class", "node-subtext");
            role.textContent = `${m.machine.primary_role} | ${isUp ? m.host.response_time_ms + 'ms' : 'OFFLINE'}`;

            g.appendChild(circle);
            g.appendChild(name);
            g.appendChild(role);
            nodeGroup.appendChild(g);
        });

        // Hub Color Shift
        const anyDown = machines.some(m => m.host.status !== 'up');
        const hub = document.getElementById('centerHub');
        const hubPulse = document.getElementById('hubPulse');
        const globalColor = anyDown ? 'var(--lcars-red)' : 'var(--lcars-gold)';
        
        hub.setAttribute('fill', globalColor);
        hubPulse.setAttribute('fill', globalColor);
        
        document.getElementById('summaryText').textContent = anyDown ? "WARNING: SYSTEM DEGRADED" : "FLEET SYSTEMS NOMINAL";
        document.getElementById('summaryText').style.color = anyDown ? 'var(--lcars-red)' : 'var(--lcars-blue)';
    }

    async function poll() {
        try {
            const res = await fetch(API_URL, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            lastData = data;

            const dataTime = new Date(data.meta.timestamp_utc).getTime();
            const now = Date.now();
            const ageS = (now - dataTime) / 1000;
            const isStale = ageS > STALE_S;

            document.getElementById('staleBanner').style.display = isStale ? 'block' : 'none';
            document.getElementById('mainHeader').style.borderBottomColor = isStale ? 'var(--lcars-amber)' : 'var(--lcars-periwinkle)';

            createSchematic(data);
            
            document.getElementById('metaInfo').textContent = 
                `STARDATE: ${Math.floor(Date.now()/100000)} // CHECKER: ${(data.meta.checker_host || '—').toUpperCase()} // AGE: ${Math.round(ageS)}S`;
            
        } catch (error) {
            console.error('Data link severed:', error);
            document.getElementById('summaryText').textContent = "ERROR: COMMS FAILURE";
            document.getElementById('summaryText').style.color = 'var(--lcars-red)';
        }
    }

    setInterval(poll, POLL_MS);
    poll();
</script>
</body>
</html>
