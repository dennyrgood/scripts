<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FLEET_OPS | TACTICAL COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcars-orange: #ff9900; --lcars-gold: #ffcc00; --lcars-blue: #99ccff;
            --lcars-periwinkle: #9999ff; --lcars-pink: #cc99cc; --lcars-red: #cc0000;
            --lcars-bg: #030508; --status-green: #00ff88; --lcars-amber: #e3b341;
            --font-main: 'Antonio', sans-serif; --font-data: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--lcars-bg); color: white;
            font-family: var(--font-main); text-transform: uppercase;
            height: 100vh; overflow: hidden; display: flex;
            user-select: none;
        }

        /* CRT EFFECT OVERLAY */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2000; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* LEFT PANEL: ADVANCED TACTICAL DATA */
        #detail-panel {
            width: 480px; height: 100%; border-right: 2px solid #222;
            display: flex; flex-direction: column; background: var(--lcars-bg);
            position: relative; z-index: 2100; padding: 10px;
        }

        /* LCARS ELBOWS */
        .elbow-top {
            height: 60px; width: 100%; background: var(--lcars-periwinkle);
            border-radius: 30px 0 0 30px; margin-bottom: 5px;
            display: flex; align-items: center; padding-left: 30px;
            color: black; font-weight: 900; font-size: 1.4rem; letter-spacing: 2px;
        }

        .elbow-bottom {
            height: 40px; width: 100%; background: var(--lcars-blue);
            border-radius: 0 0 0 30px; margin-top: 5px;
            display: flex; justify-content: flex-end; align-items: center;
            padding-right: 20px; color: black; font-weight: bold; font-size: 0.8rem;
        }

        .panel-inner {
            flex-grow: 1; border-left: 30px solid var(--lcars-periwinkle);
            margin-bottom: 5px; overflow-y: auto; scrollbar-width: thin;
            background: rgba(153, 153, 255, 0.03); display: flex; flex-direction: column;
            scrollbar-color: var(--lcars-periwinkle) transparent;
        }

        .sub-header {
            background: #111; color: var(--lcars-pink);
            padding: 8px 15px; font-size: 0.8rem; border-bottom: 2px solid var(--lcars-pink);
            display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10;
        }

        #detail-content { flex-grow: 1; display: flex; flex-direction: column; overflow-x: hidden; }

        /* DATA DISPLAY STYLES */
        .data-section-title {
            background: rgba(153, 153, 255, 0.1); color: var(--lcars-periwinkle);
            padding: 8px 15px; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;
            border-bottom: 1px solid #222; margin-top: 15px;
        }

        .data-grid { padding: 10px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .data-cell { border-left: 4px solid var(--lcars-blue); padding-left: 10px; }
        .cell-label { font-size: 0.65rem; color: var(--lcars-periwinkle); font-weight: bold; opacity: 0.8; }
        .cell-value { font-family: var(--font-data); font-size: 0.95rem; color: var(--lcars-gold); word-break: break-all; }

        .verbose-list { padding: 5px 15px; font-family: var(--font-data); font-size: 0.75rem; }
        .verbose-item { display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; padding: 4px 0; }
        .verbose-key { color: var(--lcars-periwinkle); }
        .verbose-val { color: var(--lcars-gold); text-align: right; }

        /* JSON RAW VIEW */
        .raw-json-block {
            background: #000; border: 1px solid #333; margin: 10px 15px; padding: 10px;
            font-family: var(--font-data); font-size: 0.7rem; color: #00ff88;
            min-height: 100px; max-height: 400px; overflow-y: auto; overflow-x: auto; white-space: pre-wrap;
            scrollbar-width: thin; scrollbar-color: #333 transparent;
        }

        /* SERVICE CARD */
        .service-card {
            background: rgba(153, 204, 255, 0.05); border-left: 6px solid var(--lcars-gold);
            margin: 5px 15px 10px; padding: 12px;
        }
        .service-header { display: flex; justify-content: space-between; align-items: center; }
        .service-status-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

        /* SUMMARY HERO */
        .summary-hero { padding: 25px 20px; text-align: center; background: rgba(0,0,0,0.3); }
        .hero-big { font-size: 4rem; font-weight: 700; line-height: 1; }
        .hero-sub { color: var(--lcars-blue); letter-spacing: 3px; margin-top: 8px; font-size: 0.85rem; font-weight: bold; }

        /* MANIFEST */
        .manifest-container { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        .manifest-row { 
            display: flex; justify-content: space-between; border-bottom: 1px solid #222; 
            padding: 6px 5px; font-size: 0.85rem; font-family: var(--font-data); 
            cursor: pointer;
        }
        .manifest-row:hover { background: rgba(255,255,255,0.05); }

        /* RIGHT SIDE: INTERACTIVE TACTICAL STAGE */
        .schematic-container { 
            flex-grow: 1; display: flex; flex-direction: column; position: relative; 
            padding: 10px 10px 10px 0; 
        }

        header {
            height: 60px; background: var(--lcars-orange);
            display: flex; align-items: center; justify-content: flex-end;
            padding: 0 40px; border-radius: 0 30px 0 0;
            z-index: 2100; position: relative;
        }
        .header-title { font-size: 2rem; font-weight: 700; color: black; letter-spacing: 5px; }

        #schematic-stage { 
            flex-grow: 1; position: relative; overflow: hidden; 
            background: #000; border-left: 20px solid var(--lcars-orange);
            margin-top: 5px; cursor: grab;
        }
        #schematic-stage:active { cursor: grabbing; }

        #svgCanvas { width: 100%; height: 100%; display: block; }
        #viewport-group { transition: transform 0.05s linear; transform-origin: 0 0; }

        .conduit { fill: none; stroke-width: 2.5; opacity: 0.3; transition: 0.8s; }
        .conduit.active { opacity: 1; stroke-width: 5; filter: drop-shadow(0 0 12px var(--lcars-gold)); }

        .node-rect { fill: rgba(10, 20, 30, 0.95); stroke-width: 2.5; transition: 0.3s; }
        .node-group.selected .node-rect { stroke: var(--lcars-gold); stroke-width: 4; animation: node-pulse 2s infinite; }
        
        .node-alert-bar { fill: var(--lcars-red); opacity: 0; transition: opacity 0.3s; }
        .node-group.has-service-failure .node-alert-bar { opacity: 1; }

        @keyframes node-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
        
        .label-main { fill: #fff; font-size: 16px; font-weight: 700; font-family: var(--font-data); }
        .label-sub { fill: var(--lcars-periwinkle); font-size: 11px; }
        .label-meta { font-size: 10px; font-family: var(--font-data); font-weight: bold; }

        .zoom-controls {
            position: absolute; bottom: 30px; right: 20px; z-index: 2200;
            display: flex; flex-direction: column; gap: 5px;
        }
        .zoom-btn {
            width: 60px; height: 40px; background: var(--lcars-periwinkle); color: black;
            border: none; font-weight: 900; font-size: 1rem; cursor: pointer;
            border-radius: 15px 4px 4px 15px; display: flex; align-items: center; justify-content: center;
        }

        footer { height: 40px; background: var(--lcars-blue); margin-top: 5px; border-radius: 0 0 30px 0; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; font-size: 0.8rem; color: black; font-weight: bold; }
        
        @keyframes alert-flash { 0% { border-color: transparent; } 100% { border-color: var(--lcars-red); } }
        @keyframes yellow-flash { 0% { border-color: transparent; } 100% { border-color: var(--lcars-gold); } }

        body.red-alert::after {
            content: ""; position: fixed; inset: 0; pointer-events: none;
            border: 15px solid var(--lcars-red); z-index: 3000;
            animation: alert-flash 0.8s infinite alternate;
        }
        body.yellow-alert::after {
            content: ""; position: fixed; inset: 0; pointer-events: none;
            border: 10px solid var(--lcars-gold); z-index: 3000;
            animation: yellow-flash 1.5s infinite alternate;
        }
    </style>
</head>
<body id="body">

<div id="detail-panel">
    <div class="elbow-top">FLEET_TACTICAL_DATA</div>
    
    <div class="panel-inner">
        <div class="sub-header">
            <span>STATUS: <span id="unit-status">--</span></span>
            <span id="stardate-top">SD 00000.0</span>
        </div>
        <div id="detail-content"></div>
    </div>

    <div class="elbow-bottom">
        <span id="node-tag">LINK_OFFLINE</span>
    </div>

    <div style="padding: 10px 0; display: flex; gap: 5px;">
        <div style="flex: 2; height: 35px; background: var(--lcars-orange); border-radius: 15px 0 0 15px; cursor: pointer; color: black; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem;" onclick="resetToSummary()">GLOBAL_RESET</div>
        <div style="flex: 1; height: 35px; background: var(--lcars-pink);"></div>
        <div style="flex: 1; height: 35px; background: var(--lcars-blue); border-radius: 0 15px 15px 0;"></div>
    </div>
</div>

<div class="schematic-container" id="stage-container">
    <header><div class="header-title">TACTICAL FLEET SCHEMATIC</div></header>
    <div id="schematic-stage">
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="adjustZoom(1.2)">IN</button>
            <button class="zoom-btn" onclick="autoFitFleet()">FIT</button>
            <button class="zoom-btn" onclick="adjustZoom(0.8)">OUT</button>
        </div>
        <svg id="svgCanvas">
            <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
            <g id="viewport-group"><g id="conduitGroup"></g><g id="hubGroup"></g><g id="nodeGroup"></g></svg>
    </div>
    <footer>
        <div id="metaInfo">INITIALIZING...</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a id="altFeedLink" href="#" style="color: black; text-decoration: none; border: 1px solid black; padding: 1px 10px; font-weight: bold; border-radius: 10px;">BKUP</a>
            <span>LCARS_TACTICAL_v2.5</span>
        </div>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const isBkp = params.has('bkp') || window.location.hostname.includes('fleet-bkp');
    const API_URL = isBkp ? 'https://fleet-bkp.ldmathes.cc/api/status' : 'https://fleet.ldmathes.cc/api/status';

    const altLink = document.getElementById('altFeedLink');
    if (isBkp) {
        altLink.href = "https://fleet.ldmathes.cc/ST/index.html";
        altLink.textContent = "PRI";
    } else {
        altLink.href = "https://fleet-bkp.ldmathes.cc/ST/index.html?bkp";
        altLink.textContent = "BKUP";
    }

    let scale = 1, translateX = 0, translateY = 0;
    let currentSelectedNodeId = null, lastData = null;
    let isDragging = false, startX, startY;

    const viewport = document.getElementById('viewport-group');
    const svg = document.getElementById('svgCanvas');
    const stage = document.getElementById('schematic-stage');

    // Pan & Zoom Implementation
    stage.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        applyTransform();
    });
    window.addEventListener('mouseup', () => isDragging = false);

    function applyTransform() {
        viewport.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
    }

    function adjustZoom(factor) {
        const rect = svg.getBoundingClientRect();
        const midX = rect.width / 2;
        const midY = rect.height / 2;
        const newScale = scale * factor;
        translateX = midX - (midX - translateX) * (newScale / scale);
        translateY = midY - (midY - translateY) * (newScale / scale);
        scale = newScale;
        applyTransform();
    }

    function autoFitFleet() {
        const bbox = viewport.getBBox();
        if (bbox.width === 0) return;
        const rect = svg.getBoundingClientRect();
        const padding = 100;
        scale = Math.min(rect.width / (bbox.width + padding * 2), rect.height / (bbox.height + padding * 2), 0.8);
        translateX = (rect.width / 2) - (bbox.x + bbox.width / 2) * scale;
        translateY = (rect.height / 2) - (bbox.y + bbox.height / 2) * scale;
        applyTransform();
    }

    function updateSummary(data) {
        const s = data.summary;
        const actualMachinesUp = data.machines.filter(n => n.host.status === 'up').length;
        const actualServicesUp = data.machines.reduce((acc, n) => acc + n.services.filter(svc => svc.tailscale_check?.status === 'up').length, 0);
        const totalChecks = s.machines_total + s.services_total;
        const totalPassed = actualMachinesUp + actualServicesUp;
        const operationalPct = Math.round((totalPassed / totalChecks) * 100);

        const isRedAlert = data.machines.some(n => (n.machine.priority === 'P' || n.machine.priority === 'PRIMARY') && n.host.status !== 'up');
        const isYellowAlert = !isRedAlert && (actualMachinesUp < s.machines_total || actualServicesUp < s.services_total);
        
        document.getElementById('node-tag').textContent = `FLEET_OVERVIEW`;
        document.getElementById('unit-status').textContent = isRedAlert ? 'ALARM' : (isYellowAlert ? 'WARNING' : 'NOMINAL');
        const alertColor = isRedAlert ? 'var(--lcars-red)' : (isYellowAlert ? 'var(--lcars-gold)' : 'var(--status-green)');
        document.getElementById('unit-status').style.color = alertColor;

        const content = document.getElementById('detail-content');
        content.innerHTML = `
            <div class="summary-hero">
                <div class="hero-big" style="color: ${alertColor}">${operationalPct}%</div>
                <div class="hero-sub">FLEET_OPERATIONAL_CAPACITY</div>
            </div>
            <div class="data-section-title">GLOBAL_AGGREGATE_METRICS</div>
            <div class="data-grid">
                <div class="data-cell"><div class="cell-label">TOTAL_UNITS</div><div class="cell-value">${s.machines_total}</div></div>
                <div class="data-cell"><div class="cell-label">ACTIVE_LINKS</div><div class="cell-value" style="color:var(--status-green)">${actualMachinesUp}</div></div>
                <div class="data-cell"><div class="cell-label">OFFLINE_NODES</div><div class="cell-value" style="color:${(s.machines_total - actualMachinesUp) > 0 ? 'var(--lcars-red)' : 'var(--lcars-gold)'}">${s.machines_total - actualMachinesUp}</div></div>
                <div class="data-cell"><div class="cell-label">SVC_TOTAL</div><div class="cell-value">${s.services_total}</div></div>
                <div class="data-cell"><div class="cell-label">SVC_UP</div><div class="cell-value">${actualServicesUp}</div></div>
                <div class="data-cell"><div class="cell-label">SVC_DOWN</div><div class="cell-value" style="color:var(--lcars-red)">${s.services_total - actualServicesUp}</div></div>
            </div>
            <div class="data-section-title">ACTIVE_NODE_MANIFEST</div>
            <div class="manifest-container">
                ${data.machines.map(n => {
                    const hasSvcFailure = n.services.some(svc => svc.tailscale_check?.status !== 'up');
                    let statusColor = 'var(--lcars-periwinkle)';
                    if (n.host.status !== 'up') statusColor = 'var(--lcars-red)';
                    else if (hasSvcFailure) statusColor = 'var(--lcars-gold)';
                    return `<div class="manifest-row" onclick="const node = lastData.machines.find(m=>m.machine.tailscale_name==='${n.machine.tailscale_name}'); updateDetail(node);">
                        <span style="color:${statusColor}">${n.machine.display_name}</span>
                        <span style="color:${statusColor}">${n.host.status === 'up' ? n.host.response_time_ms + 'ms' : 'OFFLINE'}</span>
                    </div>`;
                }).join('')}
            </div>
        `;
    }

    function updateDetail(m) {
        currentSelectedNodeId = m.machine.tailscale_name;
        document.querySelectorAll('.node-group').forEach(n => n.classList.toggle('selected', n.id === 'node-' + m.machine.tailscale_name));
        const isUp = m.host.status === 'up';
        const hasSvcDown = m.services.some(s => s.tailscale_check?.status !== 'up');
        document.getElementById('node-tag').textContent = `UNIT_ID_${m.machine.tailscale_name.toUpperCase()}`;
        
        const statusSpan = document.getElementById('unit-status');
        if (!isUp) { statusSpan.textContent = 'OFFLINE'; statusSpan.style.color = 'var(--lcars-red)'; }
        else if (hasSvcDown) { statusSpan.textContent = 'DEGRADED'; statusSpan.style.color = 'var(--lcars-gold)'; }
        else { statusSpan.textContent = 'ACTIVE'; statusSpan.style.color = 'var(--status-green)'; }

        const content = document.getElementById('detail-content');
        content.innerHTML = `
            <div class="data-section-title">CORE_MACHINE_IDENTITY</div>
            <div class="verbose-list">
                ${Object.entries(m.machine).map(([k,v])=>`<div class="verbose-item"><span class="verbose-key">${k.toUpperCase()}:</span><span class="verbose-val">${v}</span></div>`).join('')}
            </div>
            <div class="data-section-title">SUBSYSTEM_ANALYSIS (${m.services.length})</div>
            <div style="flex-grow:0; overflow-y:visible; padding-bottom: 5px;">
                ${m.services.map(s => {
                    const up = s.tailscale_check?.status === 'up';
                    return `<div class="service-card" style="border-left-color: ${up ? 'var(--lcars-blue)' : 'var(--lcars-red)'}">
                        <div class="service-header">
                            <div style="font-size: 0.95rem; font-weight: 900; color: ${up ? 'white' : 'var(--lcars-red)'}">${s.name.toUpperCase()}</div>
                            <div class="service-status-dot" style="background:${up ? 'var(--status-green)' : 'var(--lcars-red)'}"></div>
                        </div>
                        <div style="font-family: var(--font-data); font-size: 0.75rem; margin-top: 5px; color: var(--lcars-periwinkle)">
                            ENDPOINT: ${s.tailscale_check?.endpoint || 'N/A'}<br>
                            LAST_CHECK: ${new Date(s.tailscale_check?.timestamp).toLocaleTimeString()}
                        </div>
                    </div>`;
                }).join('')}
            </div>
            <div class="data-section-title">RAW_DATA_MANIFEST</div>
            <div class="raw-json-block">${JSON.stringify(m, null, 2)}</div>
        `;
        document.querySelectorAll('.conduit').forEach(c => c.classList.toggle('active', c.id === 'path-' + m.machine.tailscale_name));
    }

    function renderSchematic(data) {
        lastData = data;
        const conduitGroup = document.getElementById('conduitGroup'), nodeGroup = document.getElementById('nodeGroup'), hubGroup = document.getElementById('hubGroup');
        conduitGroup.innerHTML = ''; nodeGroup.innerHTML = ''; hubGroup.innerHTML = '';
        const machines = data.machines || [], centerX = 800, centerY = 400;

        hubGroup.innerHTML = `<g transform="translate(${centerX}, ${centerY})">
            <circle r="70" fill="none" stroke="var(--lcars-gold)" stroke-width="1" stroke-dasharray="8 12" opacity="0.3"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite" /></circle>
            <circle r="25" fill="var(--lcars-gold)" filter="url(#glow)" /><circle r="12" fill="black" />
            <text y="100" text-anchor="middle" fill="var(--lcars-gold)" style="font-size:16px;font-weight:bold;letter-spacing:3px;">FLEET_HUB_ALPHA</text>
        </g>`;

        machines.forEach((m, i) => {
            const spacing = 120, targetX = 120, targetY = (centerY - ((machines.length-1)*spacing)/2) + (i * spacing);
            const isUp = m.host.status === 'up', latency = m.host.response_time_ms || 0;
            const hasSvcFailure = m.services.some(svc => svc.tailscale_check?.status !== 'up');
            const pathD = `M ${centerX} ${centerY} C ${centerX-250} ${centerY} ${centerX-450} ${targetY} ${targetX + 220} ${targetY}`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.id = 'path-' + m.machine.tailscale_name; path.setAttribute("d", pathD);
            path.setAttribute("class", "conduit"); 
            path.setAttribute("stroke", isUp ? (hasSvcFailure ? 'var(--lcars-gold)' : (latency > 100 ? 'var(--lcars-amber)' : 'var(--lcars-blue)')) : 'var(--lcars-red)');
            conduitGroup.appendChild(path);

            if (isUp) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                p.setAttribute("r", "2.5"); p.setAttribute("fill", "#fff"); p.setAttribute("filter", "url(#glow)");
                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animateMotion");
                anim.setAttribute("dur", Math.max(0.5, latency/40) + "s"); anim.setAttribute("repeatCount", "indefinite"); anim.setAttribute("path", pathD);
                p.appendChild(anim); conduitGroup.appendChild(p);
            }

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node-group" + (currentSelectedNodeId === m.machine.tailscale_name ? ' selected' : '') + (hasSvcFailure ? ' has-service-failure' : ''));
            g.id = "node-" + m.machine.tailscale_name;
            g.onclick = (e) => { e.stopPropagation(); updateDetail(m); };

            const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            r.setAttribute("x", targetX); r.setAttribute("y", targetY - 40); r.setAttribute("width", "240"); r.setAttribute("height", "80");
            r.setAttribute("rx", "2"); r.setAttribute("class", "node-rect"); 
            r.setAttribute("stroke", isUp ? 'var(--lcars-periwinkle)' : 'var(--lcars-red)');
            g.appendChild(r);

            const alertBar = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            alertBar.setAttribute("x", targetX); alertBar.setAttribute("y", targetY - 40); alertBar.setAttribute("width", "8"); alertBar.setAttribute("height", "80");
            alertBar.setAttribute("class", "node-alert-bar");
            g.appendChild(alertBar);

            const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t1.setAttribute("x", targetX + 20); t1.setAttribute("y", targetY - 12); t1.setAttribute("class", "label-main"); t1.textContent = m.machine.display_name.toUpperCase();
            g.appendChild(t1);

            const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t2.setAttribute("x", targetX + 20); t2.setAttribute("y", targetY + 10); t2.setAttribute("class", "label-sub"); t2.textContent = m.machine.primary_role;
            g.appendChild(t2);

            const t3 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t3.setAttribute("x", targetX + 20); t3.setAttribute("y", targetY + 28); t3.setAttribute("class", "label-meta");
            if (!isUp) { t3.setAttribute("fill", 'var(--lcars-red)'); t3.textContent = 'LINK_SEVERED'; }
            else if (hasSvcFailure) { t3.setAttribute("fill", 'var(--lcars-red)'); t3.textContent = 'SERVICE_DEGRADED'; }
            else { t3.setAttribute("fill", 'var(--status-green)'); t3.textContent = `ONLINE // ${latency}ms`; }
            g.appendChild(t3);

            nodeGroup.appendChild(g);
        });

        if (currentSelectedNodeId) {
            const node = machines.find(m => m.machine.tailscale_name === currentSelectedNodeId);
            if (node) updateDetail(node); else updateSummary(data);
        } else updateSummary(data);

        const critDown = machines.some(n => (n.machine.priority === 'P' || n.machine.priority === 'PRIMARY') && n.host.status !== 'up');
        const anyDown = machines.some(n => n.host.status !== 'up' || n.services.some(s => s.tailscale_check?.status !== 'up'));
        document.body.classList.remove('red-alert', 'yellow-alert');
        if (critDown) document.body.classList.add('red-alert'); else if (anyDown) document.body.classList.add('yellow-alert');
        
        if (!window.initialFitDone) { setTimeout(autoFitFleet, 100); window.initialFitDone = true; }
    }

    function resetToSummary() {
        currentSelectedNodeId = null;
        document.querySelectorAll('.node-group').forEach(n => n.classList.remove('selected'));
        document.querySelectorAll('.conduit').forEach(c => c.classList.remove('active'));
        if (lastData) updateSummary(lastData);
    }

    async function poll() {
        try {
            const res = await fetch(API_URL, { cache: 'no-store' });
            const data = await res.json();
            renderSchematic(data);
            document.getElementById('stardate-top').textContent = `SD ${Math.floor(Date.now()/10000)}.${Math.floor(Date.now()%1000)}`;
            document.getElementById('metaInfo').textContent = isBkp ? "SYSTEM: BACKUP_FEED_ACTIVE" : "SYSTEM: PRIMARY_FEED_ACTIVE";
        } catch (e) { document.getElementById('metaInfo').textContent = "COMMS_INTERRUPTED"; }
    }

    setInterval(poll, 30000); poll();
</script>
</body>
</html>
