<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FLEET_OPS | TACTICAL SCHEMATIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcars-orange: #ff9900; --lcars-gold: #ffcc00; --lcars-blue: #99ccff;
            --lcars-periwinkle: #9999ff; --lcars-pink: #cc99cc; --lcars-red: #cc0000;
            --lcars-bg: #030508; --status-green: #39d353; --lcars-amber: #e3b341;
            --font-main: 'Antonio', sans-serif; --font-data: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--lcars-bg); color: white;
            font-family: var(--font-main); text-transform: uppercase;
            height: 100vh; overflow: hidden; display: flex;
        }

        /* LEFT PANEL: DATA DETAIL (Concept Image Layout) */
        #detail-panel {
            width: 420px; height: 100%; border-right: 3px solid var(--lcars-periwinkle);
            display: flex; flex-direction: column; background: rgba(5, 10, 15, 0.9);
            z-index: 20;
        }

        .panel-header {
            background: var(--lcars-periwinkle); color: black; padding: 12px 20px;
            font-weight: bold; font-size: 1.3rem; display: flex; justify-content: space-between;
            font-family: var(--font-data);
        }

        .data-section { padding: 15px 20px; border-bottom: 1px solid #1a2d4a; }
        .data-label { color: var(--lcars-periwinkle); font-size: 0.75rem; margin-bottom: 4px; }
        .data-value { color: var(--lcars-gold); font-family: var(--font-data); font-size: 0.9rem; margin-bottom: 10px; }

        #raw-output {
            flex-grow: 1; padding: 15px; font-family: 'monospace'; font-size: 0.7rem;
            color: var(--lcars-blue); overflow-y: auto; white-space: pre-wrap;
            background: rgba(0,0,0,0.6); border: 1px solid #1a2d4a; margin: 15px;
            line-height: 1.4;
        }

        /* RIGHT SIDE: SCHEMATIC */
        .schematic-container { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        header {
            height: 70px; border-bottom: 12px solid var(--lcars-orange);
            display: flex; align-items: flex-end; justify-content: flex-end;
            padding: 0 40px 8px 0; margin-left: 20px;
        }

        #schematic-stage { flex-grow: 1; position: relative; overflow: hidden; }
        svg { width: 100%; height: 100%; }

        /* SVG Components */
        .conduit { fill: none; stroke-width: 2; opacity: 0.35; transition: all 0.5s; stroke-dasharray: 1000; stroke-dashoffset: 0; }
        .conduit.up { stroke: var(--lcars-blue); }
        .conduit.down { stroke: var(--lcars-red); stroke-width: 4; opacity: 1; stroke-dasharray: none; }
        .conduit.active { opacity: 1; stroke-width: 3; stroke: var(--lcars-gold); }
        
        .node-group { cursor: pointer; }
        .node-rect { fill: rgba(0,0,0,0.85); stroke-width: 1.5; transition: 0.3s; }
        .node-group:hover .node-rect { fill: rgba(26, 45, 74, 0.9); }
        
        .label-main { fill: var(--lcars-gold); font-size: 14px; font-weight: bold; font-family: var(--font-data); }
        .label-sub { fill: var(--lcars-blue); font-size: 10px; font-family: var(--font-main); }
        .label-stat { font-size: 9px; font-family: var(--font-data); }

        .hub-core { animation: hub-glow 4s infinite ease-in-out; }
        @keyframes hub-glow { 0%, 100% { r: 15; opacity: 0.4; } 50% { r: 45; opacity: 0.1; } }

        .alert-banner {
            position: absolute; top: 15px; left: 30px;
            padding: 8px 25px; font-weight: bold; z-index: 100; 
            border-radius: 0 20px 20px 0; font-family: var(--font-data);
        }

        footer { height: 40px; border-top: 2px solid #1a2d4a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 0.75rem; color: var(--lcars-orange); }
        footer a { color: var(--lcars-blue); text-decoration: none; border: 1px solid var(--lcars-blue); padding: 2px 8px; border-radius: 4px; }
        footer a:hover { background: var(--lcars-blue); color: black; }
    </style>
</head>
<body>

<div id="detail-panel">
    <div class="panel-header">
        <span>LOG_DATA_INPUT</span>
        <span id="node-tag">SYS_ID</span>
    </div>
    
    <div class="data-section">
        <div class="data-label">PRIMARY IDENTITY</div>
        <div id="det-name" class="data-value">AWAITING SELECTION...</div>
        
        <div class="data-label">DEPLOYMENT ROLE</div>
        <div id="det-role" class="data-value">--</div>

        <div class="data-label">NETWORK ADDRESS</div>
        <div id="det-ip" class="data-value">--</div>
    </div>

    <div id="raw-output">// SELECT NODE FOR FULL TELEMETRY DOWNLINK...</div>

    <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="side-block" style="background: var(--lcars-orange); height: 35px; border-radius: 15px 0 0 15px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 0.8rem; cursor: pointer;" onclick="location.reload()">SYNC</div>
        <div class="side-block" style="background: var(--lcars-pink); height: 35px; border-radius: 0 15px 15px 0; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 0.8rem;">AUX_01</div>
    </div>
</div>

<div class="schematic-container">
    <header>
        <div id="fleet-status" style="font-size: 2rem; color: var(--lcars-gold); font-family: var(--font-data);">FLEET_OPS SCHEMATIC v1.2</div>
    </header>

    <div id="schematic-stage">
        <div id="staleBanner" class="alert-banner" style="background: var(--lcars-amber); color: black; display: none;">LINK DEGRADED: STALE DATA</div>
        <div id="redAlert" class="alert-banner" style="background: var(--lcars-red); color: white; display: none;">RED ALERT: UNIT DISCONNECTED</div>

        <svg id="svgCanvas" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <g id="conduitGroup"></g>
            <g id="nodeGroup"></g>
            
            <circle cx="850" cy="400" r="25" fill="var(--lcars-gold)" class="hub-core" filter="url(#glow)"></circle>
            <circle cx="850" cy="400" r="12" fill="var(--lcars-gold)"></circle>
            <text x="850" y="440" text-anchor="middle" fill="var(--lcars-gold)" style="font-size: 12px; font-family: var(--font-data);">CMD_CORE</text>
        </svg>
    </div>

    <footer>
        <div id="metaInfo">READY</div>
        <div style="display: flex; gap: 20px;">
            <a id="altFeedLink" href="#">SECONDARY_FEED</a>
            <span style="color: var(--lcars-periwinkle)">LCARS_INTERFACE_9.9</span>
        </div>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const isBkp = params.has('bkp');
    const API_URL = isBkp ? 'https://fleet-bkp.ldmathes.cc/api/status' : 'https://fleet.ldmathes.cc/api/status';

    document.getElementById('altFeedLink').href = isBkp 
        ? 'https://fleet.ldmathes.cc/panel/index.html' 
        : 'https://fleet-bkp.ldmathes.cc/panel/index.html?bkp';

    function updateDetail(m) {
        document.getElementById('node-tag').textContent = m.machine.tailscale_name.toUpperCase();
        document.getElementById('det-name').textContent = m.machine.display_name;
        document.getElementById('det-role').textContent = m.machine.primary_role;
        document.getElementById('det-ip').textContent = m.machine.tailscale_ip;
        document.getElementById('raw-output').textContent = JSON.stringify(m, null, 2);
        
        // Highlight active conduit
        document.querySelectorAll('.conduit').forEach(c => c.classList.remove('active'));
        const activePath = document.getElementById('path-' + m.machine.tailscale_name);
        if (activePath) activePath.classList.add('active');
    }

    function renderSchematic(data) {
        const conduitGroup = document.getElementById('conduitGroup');
        const nodeGroup = document.getElementById('nodeGroup');
        conduitGroup.innerHTML = ''; nodeGroup.innerHTML = '';

        const machines = data.machines || [];
        const centerX = 850; 
        const centerY = 400;

        machines.forEach((m, i) => {
            // Position machines in a vertical arc on the far left
            const total = machines.length;
            const spread = 700;
            const startY = 50;
            const targetX = 180;
            const targetY = startY + (i * (spread / (total - 1)));
            
            const isUp = m.host.status === 'up';
            const color = isUp ? 'var(--status-green)' : 'var(--lcars-red)';

            // Procedural Cubic Bézier for organic isoline curves
            // Moves horizontal from hub, then curves down/up to target
            const cp1X = centerX - 250;
            const cp2X = centerX - 400;
            const pathD = `M ${centerX} ${centerY} C ${cp1X} ${centerY} ${cp2X} ${targetY} ${targetX + 160} ${targetY}`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("id", 'path-' + m.machine.tailscale_name);
            path.setAttribute("d", pathD);
            path.setAttribute("class", `conduit ${isUp ? 'up' : 'down'}`);
            path.setAttribute("filter", "url(#glow)");
            conduitGroup.appendChild(path);

            // Node Panel
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node-group");
            g.onclick = () => updateDetail(m);

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", targetX); rect.setAttribute("y", targetY - 35);
            rect.setAttribute("width", "180"); rect.setAttribute("height", "70");
            rect.setAttribute("rx", "2"); rect.setAttribute("class", "node-rect");
            rect.setAttribute("stroke", color);
            g.appendChild(rect);

            // Status Indicator Dot
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", targetX + 10); dot.setAttribute("cy", targetY - 22);
            dot.setAttribute("r", "4"); dot.setAttribute("fill", color);
            g.appendChild(dot);

            const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t1.setAttribute("x", targetX + 22); t1.setAttribute("y", targetY - 18);
            t1.setAttribute("class", "label-main"); t1.textContent = m.machine.display_name;
            g.appendChild(t1);

            const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t2.setAttribute("x", targetX + 10); t2.setAttribute("y", targetY + 5);
            t2.setAttribute("class", "label-sub"); t2.textContent = m.machine.primary_role;
            g.appendChild(t2);

            const t3 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t3.setAttribute("x", targetX + 10); t3.setAttribute("y", targetY + 20);
            t3.setAttribute("class", "label-sub"); t3.textContent = m.machine.tailscale_ip;
            g.appendChild(t3);

            const t4 = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t4.setAttribute("x", targetX + 10); t4.setAttribute("y", targetY + 31);
            t4.setAttribute("class", "label-stat"); t4.setAttribute("fill", color);
            t4.textContent = isUp ? `PONG: ${m.host.response_time_ms}MS` : 'OFFLINE';
            g.appendChild(t4);

            nodeGroup.appendChild(g);
        });

        const anyDown = machines.some(m => m.host.status !== 'up');
        document.getElementById('redAlert').style.display = anyDown ? 'block' : 'none';
        document.getElementById('fleet-status').textContent = anyDown ? "TACTICAL_ALERT: UNIT_OFFLINE" : "FLEET_OPERATIONS: NOMINAL";
        document.getElementById('fleet-status').style.color = anyDown ? 'var(--lcars-red)' : 'var(--lcars-gold)';
    }

    async function poll() {
        try {
            const res = await fetch(API_URL, { cache: 'no-store' });
            const data = await res.json();
            const ageS = (Date.now() - new Date(data.meta.timestamp_utc).getTime()) / 1000;
            document.getElementById('staleBanner').style.display = ageS > 60 ? 'block' : 'none';
            renderSchematic(data);
            document.getElementById('metaInfo').textContent = `SD ${Date.now()} // CHK: ${data.meta.checker_host.toUpperCase()} // CYCLE: ${data.meta.cycle_duration_ms}MS`;
        } catch (e) {
            document.getElementById('det-name').textContent = "COMMS FAILURE";
            document.getElementById('raw-output').textContent = e.message;
        }
    }

    setInterval(poll, 30000);
    poll();
</script>
</body>
</html>
